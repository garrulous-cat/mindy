<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>檢驗報告解讀 · DR. LAN's Toolbox</title>

<meta name="description" content="貼上成大 LIS 檢驗報告，自動標示異常值並產生 Objective 與 Diagnosis 段落，便於病歷複製。">
<meta name="keywords" content="LIS,檢驗報告,異常值,Objective,Diagnosis,SOAP,病歷,生化,CBC,肝功能,UTI,血脂">
<meta name="author" content="DR. LAN">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://fmdrlan.github.io/lab.html">

<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
<link rel="shortcut icon" href="assets/favicon.ico">

<link rel="stylesheet" href="assets/shared.css">
<script src="assets/icons.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg-base: #0d1117;
    --bg-surface: #161b22;
    --bg-elevated: #1c2128;
    --bg-hover: #222832;
    --border: #30363d;
    --border-subtle: #21262d;
    --text-primary: #e6edf3;
    --text-secondary: #b0bac6;
    --text-muted: #6e7681;
    --text-dim: #4a5568;
    --accent-blue: #58a6ff;
    --accent-cyan: #39d3f2;
    --accent-green: #3fb950;
    --accent-yellow: #d29922;
    --accent-orange: #f0883e;
    --accent-red: #f85149;
    --accent-purple: #bc8cff;
    --radius: 8px;
    --radius-lg: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    min-height: 100vh;
    font-size: 16px;
    line-height: 1.6;
  }

  /* tabs-bar 樣式由 assets/shared.css 提供 */

  .container { max-width: 1500px; margin: 0 auto; padding: 24px; }

  /* Page intro */
  /* page-intro 樣式由 assets/shared.css 提供 */

  /* Layout */
  .work-stack {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .result-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: 16px;
  }
  @media (max-width: 1100px) {
    .result-grid { grid-template-columns: 1fr; }
    .container { padding: 12px; }
  }

  /* 輸入區可收合 */
  .input-panel-title {
    cursor: pointer;
    user-select: none;
    margin-bottom: 0;
  }
  .input-panel.collapsed .input-panel-title {
    margin-bottom: 0;
  }
  .input-panel.collapsed #inputBody {
    display: none;
  }
  .input-panel.collapsed {
    padding-top: 14px;
    padding-bottom: 14px;
  }
  .input-summary {
    margin-left: 10px;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
  }
  .input-panel #inputBody {
    margin-top: 14px;
  }

  /* 空狀態 */
  .empty-state {
    background: var(--bg-surface);
    border: 1px dashed var(--border);
    border-radius: var(--radius-lg);
    padding: 60px 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
  }
  .empty-state .big {
    font-size: 36px;
    margin-bottom: 12px;
  }

  /* 警示橫條 */
  .warning-banner {
    background: rgba(212, 168, 67, 0.06);
    border: 1px solid rgba(212, 168, 67, 0.30);
    border-radius: var(--radius-lg);
    padding: 12px 16px;
    font-size: 12.5px;
    color: var(--text-muted);
    line-height: 1.6;
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 8px;
  }
  .warning-banner-warn {
    color: var(--yellow, #d4a843);
    font-weight: 500;
    margin-right: 6px;
  }
  .warning-banner-group {
    display: inline;
  }
  .warning-banner-label {
    color: var(--text-primary);
    font-size: 12px;
    font-weight: 500;
    margin-right: 4px;
  }
  .warning-banner-chip {
    color: var(--yellow, #d4a843);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .warning-banner-chip.unknown {
    color: var(--text-muted);
    cursor: help;
  }
  .warning-banner-sep {
    color: var(--text-light, #566880);
    margin: 0 4px;
  }
  .warning-banner-group-sep {
    display: inline-block;
    margin: 0 8px;
    color: var(--border);
  }

  .panel {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px;
  }
  .panel-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .panel-title::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .panel-title-inner {
    display: flex; align-items: center; gap: 8px;
  }

  /* Patient mini-context */
  .ctx-row {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin-bottom: 14px; padding-bottom: 14px;
    border-bottom: 1px dashed var(--border-subtle);
  }
  .ctx-field { display: flex; align-items: center; gap: 6px; font-size: 13px; }
  .ctx-field label { color: var(--text-secondary); font-weight: 500; }
  .ctx-field input[type="number"] {
    width: 64px; padding: 4px 8px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }
  .ctx-field .radio-mini { display: inline-flex; gap: 4px; }
  .ctx-field .radio-mini label {
    padding: 3px 10px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
  }
  .ctx-field .radio-mini input { display: none; }
  .ctx-field .radio-mini input:checked + label {
    background: rgba(88,166,255,0.15);
    color: var(--accent-blue);
    border-color: rgba(88,166,255,0.4);
  }

  /* Textarea */
  textarea.lab-input {
    width: 100%;
    min-height: 280px;
    background: var(--bg-base);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    line-height: 1.5;
    padding: 12px;
    resize: vertical;
  }
  textarea.lab-input:focus {
    outline: none;
    border-color: var(--accent-blue);
  }
  textarea.lab-input::placeholder { color: var(--text-muted); }

  /* Buttons */
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .btn {
    padding: 8px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--text-primary);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: var(--bg-hover); border-color: var(--text-muted); }
  .btn.primary {
    background: var(--accent-blue);
    color: #fff;
    border-color: var(--accent-blue);
    font-weight: 600;
  }
  .btn.primary:hover {
    background: #4090e0;
    border-color: #4090e0;
  }
  .btn.ghost { background: transparent; }
  .btn.small { font-size: 12px; padding: 4px 10px; }

  /* 區段複製按鈕列 */
  .section-copy-bar {
    display: flex;
    justify-content: flex-end;
    gap: 6px;
    margin-bottom: 10px;
  }

  /* ── Output ── */
  .result-empty {
    color: var(--text-muted);
    font-size: 14px;
    padding: 60px 20px;
    text-align: center;
  }
  .result-empty .big { font-size: 36px; opacity: 0.4; margin-bottom: 12px; }

  .output-section {
    margin-bottom: 24px;
  }
  .output-section:last-child { margin-bottom: 0; }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .section-header h3 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    display: flex; align-items: center; gap: 8px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .section-header h3 .badge-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 1px 7px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-secondary);
    font-weight: 600;
  }

  /* Free-text 報告診斷列（接在 objective 數值表下方、無自己的滾輪） */
  .ft-list-divider {
    margin: 12px 0 8px;
    border-top: 1px dashed var(--border);
  }
  .ft-row {
    display: grid;
    grid-template-columns: 70px 90px 1fr;
    gap: 10px;
    align-items: baseline;
    padding: 3px 0;
  }
  .ft-row .ft-date {
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .ft-row .ft-source {
    color: var(--accent-blue);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    font-weight: 500;
  }
  .ft-row .ft-text { color: var(--text-primary); }
  @media (max-width: 700px) {
    .ft-row { grid-template-columns: 60px 70px 1fr; font-size: 12px; }
  }

  /* Objective: clean ASCII-style table */
  .objective-box {
    background: var(--bg-base);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.7;
  }
  .objective-box .obj-group-date,
  .objective-box .value,
  .objective-box .meta {
    font-family: 'JetBrains Mono', monospace;
  }
  .obj-row {
    display: grid;
    grid-template-columns: 92px 130px 1fr 42px minmax(0, 1.4fr);
    gap: 10px;
    align-items: baseline;
    padding: 2px 0;
  }
  /* 分組後的 obj-row：移除日期欄位 */
  .obj-row.grouped {
    grid-template-columns: 130px 1fr 42px minmax(0, 1.4fr);
    padding: 2px 0 2px 12px;
  }

  /* Objective 分組 */
  .obj-group {
    margin-bottom: 10px;
  }
  .obj-group:last-child { margin-bottom: 0; }
  .obj-group-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 4px 0 6px;
    margin-bottom: 2px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .obj-group-date {
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    font-weight: 600;
  }
  .obj-group-type {
    color: var(--accent, #4a9eff);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    background: rgba(74,158,255,0.10);
    border: 1px solid rgba(74,158,255,0.30);
    padding: 1px 7px;
    border-radius: 8px;
  }

  /* Free-text 分組 */
  .ft-group {
    margin-bottom: 10px;
  }
  .objective-box .ft-group:first-of-type {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px dashed var(--border);
  }
  .ft-group:last-child { margin-bottom: 0; }
  .ft-group-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 4px 0 4px;
    margin-bottom: 2px;
  }
  .ft-group-date {
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    font-weight: 600;
  }
  .ft-group-short {
    color: var(--accent, #4a9eff);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    background: rgba(74,158,255,0.10);
    border: 1px solid rgba(74,158,255,0.30);
    padding: 1px 7px;
    border-radius: 8px;
  }
  .ft-row.grouped {
    display: block;
    padding: 2px 0 2px 14px;
    color: var(--text-primary);
    font-size: 13px;
  }
  .ft-row.grouped .ft-text {
    color: var(--text-primary);
  }
  .obj-row .date {
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .obj-row .name { color: var(--text-primary); font-weight: 500; }
  .obj-row .value { text-align: right; font-weight: 600; }
  .obj-row .value.high { color: var(--accent-red); }
  .obj-row .value.low  { color: var(--accent-yellow); }
  .obj-row .value.crit { background: rgba(248,81,73,0.25); padding: 0 4px; border-radius: 3px; color: #fff; }
  .obj-row .flag {
    text-align: center;
    font-weight: 700;
    font-size: 11px;
    padding: 1px 0;
    border-radius: 3px;
  }
  .obj-row .flag.h    { background: rgba(248,81,73,0.15); color: var(--accent-red); }
  .obj-row .flag.l    { background: rgba(210,153,34,0.15); color: var(--accent-yellow); }
  .obj-row .flag.hh   { background: var(--accent-red); color: #fff; }
  .obj-row .flag.ll   { background: var(--accent-yellow); color: var(--bg-base); }
  .obj-row .meta {
    color: var(--text-muted);
    font-size: 11px;
  }
  .obj-row .meta .past {
    color: var(--accent-orange);
  }

  /* 異常但未自動診斷 chips */
  .unassigned-note {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
    line-height: 1.5;
  }
  .unassigned-sublabel {
    font-size: 11.5px;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .unassigned-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .unassigned-chip {
    display: inline-block;
    padding: 4px 10px;
    background: rgba(212, 168, 67, 0.10);
    border: 1px solid rgba(212, 168, 67, 0.35);
    border-radius: 12px;
    font-size: 12.5px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--yellow, #d4a843);
  }
  .unassigned-chip.unknown {
    background: rgba(128, 128, 128, 0.10);
    border-color: rgba(128, 128, 128, 0.35);
    color: var(--text-muted);
    cursor: help;
  }

  /* inline 版（在 Diagnosis 區底部） */
  .ua-inline {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px dashed var(--border);
    font-size: 12.5px;
    color: var(--text-muted);
    line-height: 1.7;
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 6px;
  }
  .ua-inline-warn {
    color: var(--yellow, #d4a843);
    font-weight: 500;
    margin-right: 6px;
  }
  .ua-inline-group {
    display: inline;
  }
  .ua-inline-label {
    color: var(--text-light, #566880);
    font-size: 11px;
    margin-right: 4px;
  }
  .ua-inline-chip {
    color: var(--yellow, #d4a843);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .ua-inline-chip.unknown {
    color: var(--text-muted);
    cursor: help;
  }
  .ua-sep {
    color: var(--text-light, #566880);
    margin: 0 4px;
  }
  .ua-group-sep {
    display: inline-block;
    margin: 0 8px;
    color: var(--border);
  }

  /* Diagnosis: 2-column with left-copyable, right-evidence */
  .dx-table {
    background: var(--bg-base);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .dx-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr);
    gap: 0;
    border-bottom: 1px solid var(--border-subtle);
  }
  .dx-row:last-child { border-bottom: none; }
  .dx-row .dx-left {
    padding: 12px 14px;
    font-size: 14px;
    color: var(--text-primary);
    background: var(--bg-base);
    display: flex;
    gap: 6px;
    align-items: baseline;
  }
  .dx-row .dx-left .num {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    color: var(--text-secondary);
    flex-shrink: 0;
  }
  .dx-row .dx-left .dx-tag {
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 400;
    margin-left: 2px;
  }
  .dx-row .dx-left .icd-tag {
    color: var(--accent);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    background: rgba(74,158,255,0.10);
    border: 1px solid rgba(74,158,255,0.30);
    padding: 1px 7px;
    border-radius: 8px;
    margin-left: 6px;
    cursor: help;
    user-select: all;
  }
  /* 同 ICD 合併診斷的歷史 [日期 + severity] chips */
  .dx-row .dx-left .occ-chips {
    display: inline-flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .dx-row .dx-left .occ-chip {
    font-size: 10.5px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.10);
    padding: 1px 6px;
    border-radius: 8px;
    white-space: nowrap;
  }
  .dx-row .dx-right {
    padding: 12px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    background: rgba(255,255,255,0.015);
    border-left: 1px dashed var(--border-subtle);
    line-height: 1.6;
  }
  .dx-row .dx-right .evidence-row { display: block; }
  .dx-row .dx-right .ev-item { color: var(--text-secondary); }
  .dx-row .dx-right .ev-source { color: var(--text-secondary); font-family: 'Noto Sans TC', sans-serif; font-size: 12px; }
  .dx-row .dx-right .ev-value { color: var(--accent-red); font-weight: 600; }
  .dx-row .dx-right .ev-value.low { color: var(--accent-yellow); }
  .dx-row .dx-right .ev-date { color: var(--text-dim); margin-right: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; }
  .dx-row .dx-right .past-prefix {
    color: var(--accent-orange);
    font-size: 11px;
    margin-right: 4px;
  }

  @media (max-width: 700px) {
    .dx-row { grid-template-columns: 1fr; }
    .dx-row .dx-right {
      border-left: none;
      border-top: 1px dashed var(--border-subtle);
      padding-top: 8px;
    }
    .obj-row { grid-template-columns: 82px 100px 1fr 36px; font-size: 12px; }
    .obj-row .meta { grid-column: 1 / -1; padding-left: 92px; }
  }

  .dx-right-label {
    display: inline-block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-bottom: 4px;
    font-weight: 600;
    font-family: 'Noto Sans TC', sans-serif;
  }

  /* Pending reports notice */
  /* Cross-tool 跳轉動作區 */
  .next-action-box {
    background: linear-gradient(135deg, rgba(74,158,255,0.06), rgba(74,158,255,0.02));
    border: 1px solid rgba(74,158,255,0.3);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-top: 18px;
  }
  .next-action-title {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent-blue);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 8px;
  }
  .next-action-row {
    display: flex;
    align-items: center;
    gap: 14px;
    justify-content: space-between;
    flex-wrap: wrap;
  }
  .next-action-info .primary {
    font-size: 14px;
    color: var(--text-primary);
    margin-bottom: 4px;
  }
  .next-action-info .secondary {
    font-size: 11.5px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .next-action-row .btn {
    text-decoration: none;
    flex-shrink: 0;
  }

  .pending-box {
    margin-top: 12px;
    padding: 10px 14px;
    background: rgba(240,136,62,0.06);
    border: 1px solid rgba(240,136,62,0.25);
    border-radius: var(--radius);
    font-size: 12.5px;
  }
  .pending-box .title {
    font-weight: 600;
    color: var(--accent-orange);
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .pending-box ul {
    list-style: none;
    color: var(--text-secondary);
  }
  .pending-box li {
    padding: 2px 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .pending-box li .type { color: var(--text-muted); }

  /* Patient context box */
  .pt-context {
    display: flex;
    flex-wrap: wrap;
    gap: 14px 22px;
    padding: 10px 14px;
    margin-bottom: 16px;
    background: rgba(88,166,255,0.05);
    border: 1px solid rgba(88,166,255,0.2);
    border-radius: var(--radius);
    font-size: 13px;
  }
  .pt-field { display: inline-flex; gap: 5px; align-items: baseline; }
  .pt-label {
    color: var(--text-muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
  }
  .pt-val { color: var(--text-primary); font-weight: 500; }
  .pt-val.mono { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-elevated);
    border: 1px solid var(--accent-green);
    color: var(--accent-green);
    padding: 10px 18px;
    border-radius: var(--radius);
    font-size: 13px;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Status pill */
  .status-pill {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--bg-elevated);
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .status-pill.ok { color: var(--accent-green); border-color: rgba(63,185,80,0.4); background: rgba(63,185,80,0.08); }
</style>

<main class="container">

  <div class="page-intro">
    <span class="icon">🧪</span>
    <div>
      <h2>檢驗報告解讀</h2>
      <p>從成大醫院 LIS 複製檢驗結果（可多份不同日期一起貼）。系統會自動辨識項目、跨日整合「最近一次異常」，並產生可直接複製的 Objective 與 Diagnosis 段落。</p>
    </div>
  </div>

  <div class="work-stack">

    <!-- ── 輸入區（可收合） ── -->
    <section class="panel input-panel" id="inputPanel">
      <div class="panel-title input-panel-title" id="inputPanelTitle">
        <span class="panel-title-inner">
          <span id="inputCollapseIcon">▼</span> 輸入
          <span id="inputSummary" class="input-summary" style="display:none"></span>
        </span>
      </div>

      <div id="inputBody">
        <textarea
          class="lab-input"
          id="labInput"
          spellcheck="false"
          autocomplete="off"
          placeholder="從成大醫院 LIS Ctrl + A 全選 → 複製 貼上&#10;&#10;貼上的內容僅在本機瀏覽器處理，不會上傳到任何伺服器"
        ></textarea>

        <div class="btn-row">
          <button class="btn primary" id="parseBtn">解析</button>
          <button class="btn" id="clearBtn">清除</button>
        </div>
      </div>
    </section>

    <!-- ── 病人資訊（解析後顯示） ── -->
    <div id="patientInfo" style="display:none"></div>

    <!-- ── 上方警示橫條（異常但未自動診斷） ── -->
    <div id="warningBanner" style="display:none"></div>

    <!-- ── 結果區：Obj 左 / Dx 右 ── -->
    <div class="result-grid" id="resultGrid" style="display:none">
      <section class="panel">
        <div class="panel-title">
          <span class="panel-title-inner">Objective</span>
        </div>
        <div id="objArea"></div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <span class="panel-title-inner">Diagnosis</span>
        </div>
        <div id="dxArea"></div>
      </section>
    </div>

    <!-- ── 空狀態（首次未解析） ── -->
    <div id="emptyState" class="empty-state">
      <div class="big">🧪</div>
      貼上檢驗結果後按「解析」
    </div>

  </div>

  <div style="margin-top:32px; font-size:12px; color:var(--text-muted); text-align:center; line-height:1.8;">
    參考範圍以成大檢驗報告公告值為準。診斷規則可在 <code style="font-family:'JetBrains Mono',monospace'">data/dx_rules.json</code> 編輯。<br>
    本工具僅作個人臨床備忘，不取代臨床判斷。
  </div>

</main>

<script>
'use strict';

// ─── Load data ─────────────────────────────────────────────────
const LAB_DICT = (() => {
  try { return JSON.parse(document.getElementById('lab-dict-data').textContent); }
  catch (e) { console.error('Failed to parse lab dict:', e); return { items: {}, _groups: [] }; }
})();
const DX_RULES = (() => {
  try { return JSON.parse(document.getElementById('dx-rules-data').textContent); }
  catch (e) { console.error('Failed to parse dx rules:', e); return { rules: [] }; }
})();

// ═══════════════════════════════════════════════════════════════
// PARSER + ENGINE  (mirrors scripts/parser.js)
// ═══════════════════════════════════════════════════════════════

const norm = s => String(s).toLowerCase()
  .replace(/[\s\.\-_,/\\()（）]+/g, '')
  .replace(/[％]/g, '%')
  .replace(/[：:]/g, '');

const ALIAS_MAP = (() => {
  const m = new Map();
  for (const [key, def] of Object.entries(LAB_DICT.items || {})) {
    const aliases = [key, ...(def.aliases || [])];
    for (const a of aliases) {
      const n = norm(a);
      if (n && !m.has(n)) m.set(n, key);
    }
  }
  return m;
})();

function getRef(def, sex) {
  if (def.ref_m && sex === 'M') return def.ref_m;
  if (def.ref_f && sex === 'F') return def.ref_f;
  return def.ref || null;
}

function splitReports(text) {
  const parts = text.split(/(?=^報告結果\s*-\s*)/m).filter(s => s.trim());
  return parts.map(part => {
    const firstLine = part.split('\n')[0];
    const typeMatch = firstLine.match(/報告結果\s*-\s*([^()]+?)(?:\s*\([^)]*\))?\s*-\s*單號/);
    const type = typeMatch ? typeMatch[1].trim() : '';
    const sampleMatch = part.match(/採檢\s+(\d{4}-\d{2}-\d{2})/);
    const execMatch   = part.match(/執行\s+(\d{4}-\d{2}-\d{2})/);
    const signMatch   = part.match(/簽收\s+(\d{4}-\d{2}-\d{2})/);
    const reportMatch = part.match(/報告\s+(\d{4}-\d{2}-\d{2})/);
    const date = (sampleMatch || execMatch || signMatch || reportMatch || [])[1] || null;
    const isPending = /單據狀態[：:]\s*(?:已開立|簽收\/執行(?!\s*\S))/.test(part)
      || (part.includes('單據狀態') && !/檢驗名稱.*結果/.test(part));
    return { type, date, isPending, text: part };
  });
}

function parseValue(cell, def) {
  if (!cell) return { num: null, qual: null };
  const s = cell.trim();
  const plusMatch = s.match(/^([+-]?(?:\d+\+?|\+{1,4}|-{1,2}|Trace|trace))\s*\(\s*[<>]?\s*(\d+\.?\d*)\s*\)/);
  if (plusMatch) return { num: parseFloat(plusMatch[2]), qual: plusMatch[1] };
  const rangeMatch = s.match(/^(\d+\.?\d*)\s*~\s*(\d+\.?\d*)\s*\(\s*[<>]?\s*=?\s*(\d+\.?\d*)\s*\)/);
  if (rangeMatch) return {
    num: parseFloat(rangeMatch[3]),
    qual: `${rangeMatch[1]}~${rangeMatch[2]}`,
    range: [parseFloat(rangeMatch[1]), parseFloat(rangeMatch[2])]
  };
  const qualNumMatch = s.match(/^([A-Za-z]+)\s*\(\s*[<>]?\s*=?\s*(\d+\.?\d*)\s*\)/);
  if (qualNumMatch) return { num: parseFloat(qualNumMatch[2]), qual: qualNumMatch[1] };
  const capMatch = s.match(/^[≧≥>]\s*(-?\d+\.?\d*)$/) || s.match(/^[≦≤<]\s*(-?\d+\.?\d*)$/);
  if (capMatch) return { num: parseFloat(capMatch[1]), qual: s, capped: true };
  const numMatch = s.match(/^(-?\d+\.?\d*)$/);
  if (numMatch) return { num: parseFloat(numMatch[1]), qual: null };
  if (/^\+{1,4}$/.test(s) || /^\d+\+$/.test(s)) return { num: null, qual: s };
  if (/^[A-Za-z][A-Za-z\s-]+$/.test(s)) return { num: null, qual: s };
  return { num: null, qual: s };
}

// 從報告 row 找出 ref cell。成大格式：
//   nonEmpty = [name, value, unit, ref, ...]
// 但某些項目 unit 為空，會變成 [name, value, ref, ...]
// 策略：從 value 後往後掃，找第一個「長得像 ref 區間」的 cell（不是純單位/不是LOINC code）
function findRefCell(nonEmpty, nameIdx) {
  for (let i = nameIdx + 2; i < Math.min(nameIdx + 5, nonEmpty.length); i++) {
    const c = nonEmpty[i];
    if (!c) continue;
    // 純 LOINC：4-7 位數字 + 短橫 + 數字
    if (/^\d{3,7}-\d+$/.test(c)) continue;
    // 看起來像 ref：含 - 或 ~ 或 ≦/≧/</>，或是 Negative/Normal/Non-reactive 等
    if (/[\-~≦≤≧≥<>]/.test(c) || /^(Negative|Normal|Non-reactive|Neg)/i.test(c)) {
      return c;
    }
  }
  // fallback：通常 nameIdx+3 就是 ref
  return nonEmpty[nameIdx + 3] || null;
}

// 解析 ref cell 為 [lo, hi]。
// 例：
//   "0.70-1.20"  → [0.70, 1.20]
//   "10-50"      → [10, 50]
//   "≦35"       → [0, 35]
//   "≧60"       → [60, Infinity]
//   "<200"       → [0, 200]
//   ">40"        → [40, Infinity]
//   "1.003~1.035"→ [1.003, 1.035]
//   "Negative"   → null (qualitative)
function parseRefCell(cell) {
  if (!cell) return null;
  const s = cell.trim();
  // 範圍：A-B 或 A~B
  let m = s.match(/^(-?\d+\.?\d*)\s*[-~]\s*(-?\d+\.?\d*)$/);
  if (m) return [parseFloat(m[1]), parseFloat(m[2])];
  // 上限：≦N 或 <N
  m = s.match(/^[≦≤<]\s*=?\s*(-?\d+\.?\d*)/);
  if (m) return [0, parseFloat(m[1])];
  // 下限：≧N 或 >N
  m = s.match(/^[≧≥>]\s*=?\s*(-?\d+\.?\d*)/);
  if (m) return [parseFloat(m[1]), Infinity];
  return null;
}

function parseTableSection(section) {
  const results = [];
  const lines = section.text.split('\n');
  const isUrineReport = /尿液檢驗報告|尿液、胃液/.test(section.type);
  let tableStart = -1;
  for (let i = 0; i < lines.length; i++) {
    if (lines[i].includes('檢驗名稱') && lines[i].includes('結果')) tableStart = i;
  }
  if (tableStart < 0) return null;

  let currentItem = null;
  for (let i = tableStart + 1; i < lines.length; i++) {
    const raw = lines[i];
    if (!raw.trim()) continue;
    if (raw.includes('檢驗名稱') && raw.includes('結果')) continue;
    if (/^\s*\*?COMMENT/i.test(raw)) continue;
    if (/^\s*\d{3,7}-\d+\s*$/.test(raw)) continue;

    const cells = raw.split(/\t/).map(c => c.trim());
    const nonEmpty = cells.filter(c => c !== '');
    if (nonEmpty.length < 2) {
      if (currentItem && raw.trim() && !/^\s*\d/.test(raw)) {
        currentItem.notes = (currentItem.notes || '') + ' ' + raw.trim();
      }
      continue;
    }

    let nameCell = nonEmpty[0];
    let key = ALIAS_MAP.get(norm(nameCell));
    if (!key && nonEmpty.length >= 2) {
      key = ALIAS_MAP.get(norm(nonEmpty[1]));
      if (key) nameCell = nonEmpty[1];
    }
    if (!key) {
      if (nonEmpty.length >= 2) {
        key = ALIAS_MAP.get(norm(nonEmpty[0] + ' ' + nonEmpty[1]));
      }
      if (!key) {
        // 判斷這行是不是「新項目」（有名字 + 值）vs「currentItem 的 note 延伸」
        // 看起來像數值或結果：含數字、Non-reactive、Reactive、Positive、Negative
        const looksLikeNewItem = nonEmpty.length >= 2 &&
          /[A-Za-z\u4e00-\u9fff]/.test(nonEmpty[0]) &&
          /\d|Non-reactive|Reactive|Positive|Negative|Trace|\+/i.test(nonEmpty[1]);

        if (looksLikeNewItem) {
          // 尿液 sediment 報告的標準欄位 - 不該被當作字典未收錄
          const URINE_SEDIMENT_FIELDS = new Set([
            'Others', 'Cast', 'Crystal', 'EC', 'Color', 'Clarity',
            'Bacteria', 'Yeast', 'Mucus', 'Sperm'
          ]);
          if (isUrineReport && URINE_SEDIMENT_FIELDS.has(nonEmpty[0])) {
            // 是尿液 sediment 標準欄位，但字典沒收（例如 Others）→ 安靜跳過
            currentItem = null;
            continue;
          }
          // 收集為 unknown，UI 提示醫師「字典未收錄」
          results.push({
            key: nonEmpty[0],
            def: null,           // 標記為未收錄
            unknown: true,
            raw,
            valueCell: nonEmpty[1],
            num: null, qual: nonEmpty[1],
            sampledAt: section.date,
            sourceType: section.type,
            flag: '?'
          });
          currentItem = null;   // 不要讓下一行誤接成這行的 note
        } else if (currentItem && /[a-zA-Z\u4e00-\u9fff]/.test(raw)) {
          currentItem.notes = (currentItem.notes || '') + ' ' + raw.trim();
        }
        continue;
      }
    }

    if (isUrineReport) {
      if (key === 'WBC') key = 'U-WBC';
      else if (key === 'RBC') key = 'U-RBC';
    }

    const def = LAB_DICT.items[key];
    const nameIdx = nonEmpty.indexOf(nameCell);
    const valueCell = nonEmpty[nameIdx + 1] || '';
    // 第 4 欄通常是 ref（成大格式：註 / 名稱 / 結果 / 單位 / 參考區間 / 備註 / LOINC）
    // 但「註」常常是空字串被 filter 掉了，所以實際 nonEmpty 的 index 是：name=0, value=1, unit=2, ref=3
    // 不過有時 unit 也是空 — 我們取 [nameIdx+1 之後] 找看起來像 ref 的那個
    const refCell = findRefCell(nonEmpty, nameIdx);
    const reportRef = parseRefCell(refCell);
    const v = parseValue(valueCell, def);

    currentItem = {
      key, def, raw, valueCell,
      num: v.num, qual: v.qual, capped: v.capped, range: v.range,
      reportRef,       // 從報告解析出的 ref：[lo, hi] 或 null
      sampledAt: section.date,
      sourceType: section.type,
      notes: ''
    };
    results.push(currentItem);
  }

  // Apply prefer_note logic (e.g., eGFR 計算值: N)
  for (const item of results) {
    if (item.def && item.def.prefer_note && item.notes) {
      const m = item.notes.match(/(?:計算值|計算結果)\s*[:：]\s*(-?\d+\.?\d*)/);
      if (m) {
        item.num = parseFloat(m[1]);
        item.qual = m[1];
        item.capped = false;
      }
    }
  }

  return results;
}

function parseSpecialSection(section) {
  const results = [];
  const lines = section.text.split('\n');
  for (const raw of lines) {
    let m = raw.match(/足踝肱動脈血壓比.*?(左側|右側).*?[:：]\s*(\d+\.?\d*)/);
    if (m) {
      const key = m[1] === '左側' ? 'ABI-L' : 'ABI-R';
      const def = LAB_DICT.items[key];
      if (def) results.push({
        key, def, raw, valueCell: m[2],
        num: parseFloat(m[2]), qual: null,
        sampledAt: section.date, sourceType: section.type, notes: ''
      });
      continue;
    }
    m = raw.match(/肱踝動脈間脈波速率.*?(左側|右側).*?[:：]\s*(\d+\.?\d*)/);
    if (m) {
      const key = m[1] === '左側' ? 'PWV-L' : 'PWV-R';
      const def = LAB_DICT.items[key];
      if (def) results.push({
        key, def, raw, valueCell: m[2],
        num: parseFloat(m[2]), qual: null,
        sampledAt: section.date, sourceType: section.type, notes: ''
      });
    }
  }
  return results;
}

function parseDemographics(text) {
  // 嘗試從 LIS 文字頂端的「病人基本資料」抓姓名、病歷號、性別、年齡
  // 範例：病歷號碼\t22536006\t姓名(性別)\t陳金惠(女)\t生日(年齡)\t1973-09-24(52歲)
  const demo = { name: null, chartNo: null, sex: null, age: null, birthDate: null };

  // 病歷號碼
  let m = text.match(/病歷號碼\s*[\t　\s]*\s*(\d{4,12})/);
  if (m) demo.chartNo = m[1];

  // 姓名(性別)
  m = text.match(/姓名\s*\([^)]*\)\s*[\t　\s]+\s*([\u4e00-\u9fff·•・\s]{2,15}?)\s*\(([男女MFmf])\)/);
  if (m) {
    demo.name = m[1].trim();
    const s = m[2].toUpperCase();
    demo.sex = (s === '男' || s === 'M') ? 'M' : (s === '女' || s === 'F') ? 'F' : null;
  }

  // 生日(年齡)：1973-09-24(52歲)  ← 必須含「歲」字才算
  m = text.match(/(\d{4}-\d{2}-\d{2})\s*\(\s*(\d{1,3})\s*歲\s*\)/);
  if (m) {
    demo.birthDate = m[1];
    demo.age = parseInt(m[2]);
  }

  return demo;
}

// ─── Free-text report parsing (內視鏡、病理、影像、皮膚科超音、X光) ─────
// 抓 Impression / IMPRESSION / DIAGNOSIS / PATHOLOGICAL DIAGNOSIS 段落
// 回傳 [{ text, sourceLabel, sampledAt }]

const FREE_TEXT_TYPES = [
  { match: /內視鏡室檢查報告/,          label: '內視鏡',     short: 'EGD',       keywords: ['DIAGNOSIS', 'IMPRESSION'] },
  { match: /病理組織切片報告/,          label: '病理切片',   short: 'Pathology', keywords: ['PATHOLOGICAL DIAGNOSIS', 'DIAGNOSIS'] },
  { match: /細胞學檢查報告/,            label: '細胞學',     short: 'Cytology',  keywords: ['DIAGNOSIS', 'IMPRESSION', 'CYTOLOGIC DIAGNOSIS'] },
  // 超音波（要在 X 光 / 放射線 match 之前先匹配、否則「放射線部超音波」會被「放射線」吃掉）
  { match: /超音波/,                    label: '超音波',     short: 'US',        keywords: ['Impression', 'IMPRESSION', 'IMP'] },
  { match: /(電腦斷層|CT)/,             label: 'CT',         short: 'CT',        keywords: ['Impression', 'IMPRESSION', 'IMP'] },
  { match: /磁振造影/,                  label: 'MRI',        short: 'MRI',       keywords: ['Impression', 'IMPRESSION', 'IMP'] },
  { match: /Ｘ光|X光|X-ray|放射線/,     label: 'X光',        short: 'XR',        keywords: ['Impression', 'IMPRESSION', 'IMP'] },
  { match: /皮膚科檢查報告/,            label: '皮膚科超音', short: 'Skin US',   keywords: ['Impression', 'IMPRESSION', 'IMP'] },
  { match: /家醫部特殊檢查報告/,        label: '家醫部',     short: 'FM',        keywords: ['醫師診斷', 'DIAGNOSIS', '診斷'] },
  { match: /健檢中心檢查報告/,          label: '健檢中心',   short: 'Checkup',   keywords: ['Impression', 'IMPRESSION', 'IMP', 'DIAGNOSIS'] },
  { match: /新陳代謝科檢查報告/,        label: '新陳代謝',   short: 'Endo',      keywords: ['Impression', 'IMPRESSION', 'IMP'] },
  { match: /心臟內科檢查報告/,          label: '心臟內科',   short: 'ECG',       keywords: ['Impression', 'IMPRESSION', 'IMP', 'DIAGNOSIS', '__SPECIAL_ECG__'] },
  { match: /神經傳導速度/,              label: '神經傳導',   short: 'NCV',       keywords: ['IMPRESSION', 'DIAGNOSIS', 'IMP'] },
  { match: /泌尿科部檢查報告/,          label: '泌尿科',     short: 'Urology',   keywords: ['Impression', 'IMPRESSION', 'DIAGNOSIS', 'IMP'] },
  { match: /行為神經學檢查報告/,        label: '神經行為',   short: 'Cognitive', keywords: ['__SPECIAL_COGNITIVE__'] },
];

// X 光細分：KUB / CXR / 其他 — 根據報告內容偵測
function refineXrayShort(text) {
  if (/KUB\b|abdominal\s+plain|abd\.?\s+plain/i.test(text)) return 'KUB';
  if (/CXR\b|chest\s+plain|chest\s+film|chest\s+x[- ]?ray|chest\s+PA/i.test(text)) return 'CXR';
  if (/mammograph|乳房攝影/i.test(text)) return 'Mammo';
  if (/(thoracolumbar|lumbar|L-spine|LS\s+spine|腰椎)/i.test(text)) return 'L-spine XR';
  if (/(cervical|C-spine|頸椎)/i.test(text)) return 'C-spine XR';
  return 'XR';
}

// 通用 short 判斷：依報告內容文字決定實際做的是什麼檢查
// 例如「健檢中心檢查報告」可能是腹超 / 甲狀腺超 / FibroScan / ABI / HRV / Mammography
function refineShortByContent(typeInfo, text) {
  // X 光特殊
  if (typeInfo.label === 'X光') return refineXrayShort(text);

  // 健檢中心：依內容判斷
  if (typeInfo.label === '健檢中心') {
    if (/abdominal\s+sonograph|腹部超音波/i.test(text)) return 'Abd Echo';
    if (/thyroid\s+sonograph|甲狀腺超音波/i.test(text)) return 'Thy Echo';
    if (/breast.*sonograph|乳房超音波/i.test(text)) return 'Breast Echo';
    if (/FibroScan|liver\s+stiffness/i.test(text)) return 'FibroScan';
    if (/\bABI\b|baPWV|ankle.brachial/i.test(text)) return 'ABI';
    if (/heart\s+rate\s+variability|HRV/i.test(text)) return 'HRV';
    if (/mammograph/i.test(text)) return 'Mammo';
    return 'Checkup';
  }

  // 新陳代謝科：甲狀腺超音波（包含 FNA 描述）
  if (typeInfo.label === '新陳代謝') {
    if (/thyroid|甲狀腺/i.test(text)) return 'Thy Echo';
    return 'Endo';
  }

  // 內視鏡：colonoscopy vs EGD（依內容文字）
  if (typeInfo.label === '內視鏡') {
    // 大腸鏡關鍵字
    if (/colon|cecum|ileum|terminal\s+ileum|rectum|ascending|sigmoid|descending\s+colon|transverse\s+colon|colonoscop|大腸鏡/i.test(text)) return 'Colonoscopy';
    // 胃鏡關鍵字
    if (/esophagus|stomach|duodenum|antrum|fundus.*stomach|EGD|gastroscop|panendoscop|胃鏡/i.test(text)) return 'EGD';
    return 'EGD';  // 預設
  }

  // 病理切片：依檢體部位細分
  if (typeInfo.label === '病理切片') {
    if (/colon|cecum|sigmoid|ascending|descending\s+colon|rectum/i.test(text)) return 'Colon Pathology';
    if (/stomach|gastric|duodenum/i.test(text)) return 'EGD Pathology';
    if (/thyroid|甲狀腺/i.test(text)) return 'Thy Pathology';
    if (/breast|乳房/i.test(text)) return 'Breast Pathology';
    if (/skin|cutan/i.test(text)) return 'Skin Pathology';
    return 'Pathology';
  }

  // 細胞學：FNA / Pap / 痰
  if (typeInfo.label === '細胞學') {
    if (/thyroid|甲狀腺|FNA.*thyroid|thyroid.*FNA/i.test(text)) return 'Thy FNA';
    if (/cervix|cervical|pap\s+test|子宮頸抹片/i.test(text)) return 'Pap';
    if (/sputum|痰/i.test(text)) return 'Sputum cyto';
    if (/breast.*FNA|FNA.*breast/i.test(text)) return 'Breast FNA';
    return typeInfo.short;
  }

  // 心臟內科：實際上幾乎都是 ECG，保持 ECG
  // 超音波 / MRI / CT 等保持原 short

  return typeInfo.short;
}

function detectFreeTextType(sectionType) {
  for (const t of FREE_TEXT_TYPES) {
    if (t.match.test(sectionType)) return t;
  }
  return null;
}

// 抓 culture 報告（陰性跳過、陽性回傳菌名）
function parseCultureSection(section) {
  const text = section.text;
  // 陰性培養各種寫法：
  //   "No aerobic and No anaerobic pathogens were isolated after 5 days incubation"
  //   "No aerobic bacteria isolated"
  //   "No growth"
  //   "No bacteria isolated"
  //   "No organism"
  if (/No\s+(?:aerobic|anaerobic|growth|bacteria|organism|pathogen)/i.test(text)) {
    return [];   // 陰性培養：跳過
  }
  // 嘗試抓「ISOLATE:」或「Final report:」後的菌名
  const dx = [];
  const isolateMatch = text.match(/(?:isolated|Isolate|FINAL REPORT)[：:\s]+([\s\S]+?)(?:\n\n|報告結果|$)/);
  if (isolateMatch) {
    const cleaned = isolateMatch[1].trim().split(/\n+/)[0].replace(/^[-•・]+\s*/, '').trim();
    if (cleaned && cleaned.length < 200) {
      dx.push({ text: cleaned, sourceLabel: '細菌培養', sourceShort: 'Culture', sampledAt: section.date });
    }
  }
  return dx;
}

// ── ECG 純文字判讀抽取 ─────────────────────────────────────────────
function parseEcgReport(section, typeInfo) {
  const results = [];
  const text = section.text;
  // 找含特定關鍵字的行：CONSIDER / SUGGEST / SUSPECT
  // 或常見診斷字：A.?Fib / AVB / ST elevation / ST depression / bradycardia / tachycardia / bundle branch block / LVH / RVH / 心室肥大
  const lines = text.split('\n');
  for (let raw of lines) {
    raw = raw.trim();
    if (!raw) continue;
    // 跳過明確的正常節律
    if (/^SINUS\s+RHYTHM\s*$/i.test(raw)) continue;
    if (/^Normal\s+(ECG|sinus)/i.test(raw)) continue;

    let isAbnormal = false;
    // (1) CONSIDER / SUGGEST / SUSPECT XXX
    if (/^(CONSIDER|SUGGEST|SUSPECT)\b/i.test(raw)) isAbnormal = true;
    // (2) 特定診斷關鍵字
    if (/\b(A\.?\s?Fib|atrial\s+fibrillation|AV\s*block|AVB\b|bradycardia|tachycardia|bundle\s+branch\s+block|LBBB|RBBB|hypertrophy|ischemi[ac]|infarction|ST\s+(elevation|depression)|Q\s+wave|prolonged\s+QT)/i.test(raw)) isAbnormal = true;
    if (!isAbnormal) continue;
    // 拆出 prefix（CONSIDER/SUGGEST/SUSPECT）+ 主體
    let prefix = '';
    let body = raw;
    const pm = raw.match(/^(CONSIDER|SUGGEST|SUSPECT)\s+(.+)$/i);
    if (pm) {
      prefix = pm[1].charAt(0).toUpperCase() + pm[1].slice(1).toLowerCase();
      body = pm[2];
    }
    // 主體若是純大寫，轉 title case
    if (/^[A-Z][A-Z\s,.\-]*[A-Z]$/.test(body) || /^[A-Z]+$/.test(body)) {
      body = body.toLowerCase().replace(/\b([a-z])/g, (_, c) => c.toUpperCase());
    }
    const dxText = prefix ? `${prefix} ${body}` : body;
    if (dxText.length < 200) {
      results.push({
        text: dxText,
        sourceLabel: typeInfo.label,
        sourceShort: typeInfo.short,
        sampledAt: section.date,
        fromFreeText: true
      });
    }
  }
  return results;
}

// ── 認知功能測驗（CDR / CASI / MMSE）抽取 ─────────────────────────────
function parseCognitiveReport(section, typeInfo) {
  const results = [];
  const text = section.text;
  // 模式 1：Clinical diagnosis: XXX 或 Clinical problem: XXX
  const m = text.match(/Clinical\s+(?:diagnosis|problem)\s*[:：]\s*([^\n]+)/i);
  if (m) {
    let dx = m[1].trim().replace(/[。\.\s]+$/, '');
    if (dx && dx.length < 200 && !/^(none|nil|n\/a|unremarkable|normal)$/i.test(dx)) {
      results.push({
        text: dx,
        sourceLabel: typeInfo.label,
        sourceShort: typeInfo.short,
        sampledAt: section.date,
        fromFreeText: true
      });
    }
  }
  // 模式 2：Interpretation 區「Abnormal」（但前一個模式抓到 dx 名已經夠了，這個不抽）
  return results;
}

function parseFreeTextSection(section, typeInfo) {
  const results = [];
  const text = section.text;

  // ── 特殊處理：ECG ──
  if (typeInfo.keywords.includes('__SPECIAL_ECG__')) {
    return parseEcgReport(section, typeInfo);
  }
  // ── 特殊處理：認知測驗 ──
  if (typeInfo.keywords.includes('__SPECIAL_COGNITIVE__')) {
    return parseCognitiveReport(section, typeInfo);
  }

  // 依關鍵字嘗試抓段落
  for (const kw of typeInfo.keywords) {
    if (kw.startsWith('__SPECIAL_')) continue;
    // 抓 KW: ... 直到下一個全大寫標題（NOTE/GROSS/MICROSCOPIC/Pathologists/檢查醫師/醫師簽章），
    // 或連續兩個空行，或抵達區塊結尾
    const pattern = new RegExp(
      kw + '\\s*[：:]?\\s*\\n?([\\s\\S]*?)' +
      '(?=\\n\\s*(?:NOTE|GROSS|MICROSCOPIC|Pathologists|檢查醫師|醫師簽章|醫師簽章|報告結果|\\n\\n|[A-Z]{4,}[：:]|Impression|IMPRESSION|DIAGNOSIS)|$)',
      ''
    );
    const m = text.match(pattern);
    if (!m) continue;
    const body = m[1].trim();
    if (!body) continue;

    // 分行 / bullet / 分號 / 句號（保留條目）
    let lines = body
      .split(/\n+|;|；/)
      .map(s => s.replace(/^[\s\->•・*>＞＝=\]\[]+/, '')   // 加 = / ＝ 前綴去除（健檢中心格式）
                  .replace(/^\d+[\)\.]\s*/, '')
                  .replace(/^診斷\s*[:：]\s*/, '')
                  .replace(/^Dx\s*[:：]\s*/i, '')
                  .replace(/[。\.\s]+$/, '')
                  .trim())
      .filter(s => s.length > 0 && s.length < 200);

    // 去掉 meta/雜訊（醫師名、報告編號、null 等）
    lines = lines.filter(line => {
      if (/^(null|N\/A|None|Nil|無|\]|\[)$/i.test(line)) return false;
      if (/^(Fellow|R:|VS:|主治醫師|檢查醫師|醫師簽章|Pathologists?|Premedication|Clinical Information|Indication|Rapid urease test|AccessionNumber|PatientID)/i.test(line)) return false;
      if (/醫師.*[-－]\s*[\u4e00-\u9fff]+專/.test(line)) return false;
      if (/^(Right|Left)\s+kidney\s+size|^Spleen\s*=|^kidney\s*=/i.test(line)) return false;
      if (/^(Normal\s+(?:heart\s+size|sized?))$/i.test(line)) return false;
      if (/(?:is\s+not\s+(?:widened|enlarged|dilated)|is\s+intact|are\s+intact|appears?\s+normal|are\s+free\s+of|unremarkable|not\s+distended)$/i.test(line)) return false;

      // === 加強過濾：報告中的 meta/標記/常見 noise ===
      // 病理單行「Confirmed」「Confirmed.」（外科病理確認用語，不是診斷）
      if (/^Confirmed\s*\.?\s*$/i.test(line)) return false;
      // 建議文：Recommend...、Please correlate...、Suggest clinical correlation 等
      if (/^(Recommend(?:ed|ation)?\s+|Please\s+correlate|Clinical\s+correlation\s+is)/i.test(line)) return false;
      if (/^Suggest\b/i.test(line) && !/(suspicious|malignan|tumor|mass)/i.test(line)) return false;
      // 正常解剖描述（Bilateral X are sharp/clear、X is unremarkable）
      if (/\b(are|is)\s+(sharp|clear|patent|unremarkable|symmetric(?:al)?|smooth|intact)\b/i.test(line) && !/\b(mass|lesion|tumor|nodule|opacity|infiltrate|suspicious|hernia|polyp|cyst|effusion)\b/i.test(line)) return false;
      // checkbox 表單行（新陳代謝科 FNA / 健檢中心常見）
      if (/^[□■☐☑✓✔]/i.test(line)) return false;
      if (/^(Suggestion|Suggestions)\s*[:：]?\s*$/i.test(line)) return false;
      // R\d+ 醫師名（住院醫師輪訓格式 R4 ABC XX）
      if (/^R\d+\s+[A-Z]/.test(line)) return false;
      // (數字) 標題行（如 (4)NOTE:、(1)Liver stiffness:）
      if (/^\(\d+\)\s*[A-Z]/i.test(line) && /[:：]\s*$/.test(line)) return false;
      // 太長的描述（>120 chars 通常是 finding 細節而非診斷）
      if (line.length > 120) return false;
      // FibroScan 數值描述
      if (/^The\s+controlled\s+attenuation\s+parameter/i.test(line)) return false;
      if (/^The\s+liver\s+stiff(?:i?)ness/i.test(line)) return false;
      // BIRADs / Bethesda 分級為陰性的整行
      if (/BIRADs?\s+category\s*[:：]?\s*[01]\b/i.test(line)) return false;
      if (/^BIRADs?\s+category\s*\d\s*[:：]/i.test(line)) {
        // 只有明確 1（normal/benign）才過濾、3+ 保留
        if (/[:：]\s*(Negative|Benign)/i.test(line)) return false;
      }
      // 純粹的「Negative」/「Normal」/「Within normal limit」開頭
      if (/^(NEGATIVE\s+FOR|Within\s+normal\s+limit|Negative\s+finding)/i.test(line)) return false;
      // Note 段落
      if (/^Note\s*[:：]?\s*$/i.test(line)) return false;
      if (/^\(\d+\)\s+/.test(line)) return false;  // (1) (2) (3) 開頭的條列
      // 病理單純的部位 + biopsy 行（不是診斷、只是樣本來源）
      if (/^(Colon|Liver|Kidney|Lung|Thyroid|Breast|Stomach|Skin|Soft\s+tissue),\s+\w+;?\s*biopsy/i.test(line)) return false;
      if (/biopsy\s+and\s+removal\s*[:：]?\s*$/i.test(line)) return false;
      // FibroScan 等 normal 結果
      if (/Metavir\s+F\s*0[\-~]?1?/i.test(line)) return false;
      if (/無明顯肝臟纖維化/.test(line)) return false;

      // 「形容詞 + 部位」型的正常 finding
      if (/^(Clear|Patent|Normal|Intact|Symmetric(?:al)?|Smooth|Preserved|Well[-\s]?(?:defined|aerated|preserved))\b/i.test(line)) {
        if (!/\b(mass|lesion|tumor|nodule|opacity|infiltrate|suspicious)\b/i.test(line)) return false;
      }
      if (/[,，][\s\S]+[,，][\s\S]+[:：]\s*$/.test(line)) return false;
      if (/(?:biopsy|excision|aspiration|resection)\s*[:：]?\s*$/i.test(line)) return false;
      if (/^(Soft\s+tissue|Bladder|Liver|Kidney|Lung|Brain|Heart|Stomach|Colon|Skin|Muscle|Bone|Lymph|Breast|Prostate|Ovary|Uterus|Cervix|Thyroid|Parathyroid|Pancreas|Spleen|Gallbladder|Esophagus|Duodenum|Jejunum|Ileum|Appendix|Rectum)[,，]/i.test(line)) return false;
      if (/^\d/.test(line) && line.length < 8) return false;
      if (/^[a-z\u4e00-\u9fff]+\s*[:：]\s*$/.test(line)) return false;
      if (/^(?:[Ii]so|[Hh]yper|[Hh]ypo|[Aa]n)[\-\s]?(?:to|echoic|echogenic)/.test(line) && !/lipoma|cyst|stone|tumor|mass|lesion\s+suspect/i.test(line)) return false;

      // Negative finding 過濾（強化）：
      // 「No XXX」「No obvious XXX」「No obivious XXX (typo)」「No active XXX」開頭
      // 注意：obivious 是醫師手寫常見 typo
      if (/^No\s+(?:obi?vious|abnormal|definite|evidence|focal|gross|significant|active|obvious|apparent|specific)?/i.test(line)) {
        // 只有「有重要 dx + 有 caveat」才保留（例: No obvious cancer, but suggest follow up）
        // 純 negative finding（No XXX mass、No tumor）即使提到 mass/tumor 也不算診斷
        const hasCaveat = /\b(may|might|but|however|cannot\s+(?:exclude|rule\s+out)|too\s+subtle|despite|though|although|further\s+(?:follow|workup|evaluation)|suggest(?:ed|s)?\s+(?:follow|workup))\b/i.test(line);
        if (!hasCaveat) return false;  // 沒 caveat 一律過濾
      }

      return true;
    });

    for (const line of lines) {
      const short = refineShortByContent(typeInfo, text);
      // 細胞學/病理的「UNSATISFACTORY due to ...」簡化為「unsatisfactory」
      let cleanText = line;
      if (/^UNSATISFACTORY\b/i.test(cleanText)) {
        cleanText = 'unsatisfactory';
      }
      // 病理/細胞學的「Thyroid, left, FNA:」這類部位前綴去除（保留實際 finding）
      cleanText = cleanText.replace(/^(Thyroid|Breast|Skin|Lymph\s+node|Lung|Liver|Colon|Stomach)[,，][\s\S]*?(FNA|biopsy|cytology|smear)\s*[:：]\s*/i, '');
      // 「R/O XXX」轉成「XXX (suspected)」（影像 IMP 常見、表示 rule out）
      cleanText = cleanText.replace(/^R\s*\/\s*O\s+(.+?)\.?$/i, '$1 (suspected)');
      results.push({
        text: cleanText,
        sourceLabel: typeInfo.label,
        sourceShort: short,
        sampledAt: section.date
      });
    }
    if (results.length > 0) break;  // 第一個有結果的關鍵字就停
  }

  return results;
}

// ─── 家醫部特殊檢查的子類型 parser ───────────────────────────────────
// 偵測是哪一種子類型（眼底篩檢/足部檢查/多汗症），不是的話回傳 null
function detectFMSubtype(text) {
  if (/糖尿病眼底篩檢|視網膜病變|NPDR|PDR|NDR/.test(text)) return 'fundus';
  if (/足部檢查|足背動脈脈搏|單股尼龍線|皮膚受損|足癬|感染潰瘍|截肢/.test(text)) return 'foot';
  if (/FEET SCORE|HANDS SCORE|CONDUCTANCES|sudomotor/i.test(text)) return 'sudomotor';
  return null;
}

// 眼底篩檢：抓出哪眼有 retinopathy
function parseFundusSection(section) {
  const text = section.text;
  // 右眼: 非增殖性視網膜病變NPDR-mild  /  左眼: 無糖尿病視網膜病變NDR
  const eyePatterns = [
    { side: '右眼', re: /右眼\s*[:：]\s*([^\n]+)/ },
    { side: '左眼', re: /左眼\s*[:：]\s*([^\n]+)/ }
  ];
  const retinopathy = [];   // 有病變
  const unevaluable = [];   // 無法評估
  const reasonsMatch = text.match(/(?:無法評估|不能評估)原因\s*[:：]+\s*([^\n]+)/);
  const unevalReason = reasonsMatch ? reasonsMatch[1].replace(/^[:：\s]+/, '').trim() : '';

  for (const e of eyePatterns) {
    const m = text.match(e.re);
    if (!m) continue;
    const content = m[1].trim();
    // 無法完整評估：第三種狀態
    if (/無法.*評估|不能.*評估|無法判讀|無法辨識|影像.*不佳|影像.*品質|cannot\s+evaluate|unable\s+to\s+assess/i.test(content)) {
      unevaluable.push(e.side);
      continue;
    }
    // 正常：NDR / 無糖尿病視網膜病變 / Normal (排除無法評估後才檢查)
    if (/^(無糖尿病|NDR|Normal|無.*病變)/.test(content) || (/NDR/.test(content) && !/NPDR|PDR/.test(content))) continue;
    // 病變：NPDR-mild/moderate/severe、PDR、CSME、ME
    if (/NPDR|PDR|增殖性|視網膜病變|黃斑部|maculopathy|CSME|edema/i.test(content)) {
      retinopathy.push(`${e.side}: ${content}`);
    }
  }

  const results = [];
  if (retinopathy.length > 0) {
    results.push({
      text: `Diabetic retinopathy (${retinopathy.join('; ')})`,
      sourceLabel: '眼底篩檢',
      sourceShort: 'Fundus',
      sampledAt: section.date
    });
  }
  if (unevaluable.length > 0) {
    const eyesStr = unevaluable.length === 2 ? 'bilateral' : (unevaluable[0] === '右眼' ? 'right eye' : 'left eye');
    let dxText = `Fundus exam unevaluable (${eyesStr})`;
    if (unevalReason) dxText += ` — ${unevalReason}`;
    dxText += ', further ophthalmology workup recommended';
    results.push({
      text: dxText,
      sourceLabel: '眼底篩檢',
      sourceShort: 'Fundus',
      sampledAt: section.date
    });
  }
  return results;
}

// 足部檢查：列出 (+) 異常項目
function parseFootSection(section) {
  const text = section.text;
  // 抓「項目: 右(?), 左(?)」格式
  const abnormalItems = [];
  const patterns = [
    { key: '皮膚受損', en: 'skin lesion' },
    { key: '足癬', en: 'tinea pedis' },
    { key: '趾甲異常', en: 'nail deformity' },
    { key: '感染潰瘍', en: 'infected ulcer' },
    { key: '胼胝/雞眼', en: 'callus/corn' },
    { key: '外觀變形', en: 'foot deformity' },
    { key: '截肢', en: 'amputation' }
  ];
  for (const p of patterns) {
    const re = new RegExp(p.key + '\\s*[:：]\\s*(右|左)\\s*\\(([+\\-－])\\)\\s*,?\\s*(右|左)\\s*\\(([+\\-－])\\)');
    const m = text.match(re);
    if (!m) continue;
    const sides = [];
    if (m[2] === '+') sides.push(m[1]);
    if (m[4] === '+') sides.push(m[3]);
    if (sides.length === 0) continue;
    const sideStr = sides.length === 2 ? 'bilateral' : (sides[0] === '右' ? 'right' : 'left');
    abnormalItems.push(`${p.en} (${sideStr})`);
  }
  // 抓單股尼龍線是否異常
  const monoMatch = text.match(/單股尼龍線\s*[:：]\s*右\s*[:：]?\s*([^,，]+)\s*,?\s*左\s*[:：]?\s*([^\n]+)/);
  if (monoMatch) {
    const rNormal = /^正常|Normal/.test(monoMatch[1].trim());
    const lNormal = /^正常|Normal/.test(monoMatch[2].trim());
    if (!rNormal || !lNormal) {
      const side = (!rNormal && !lNormal) ? 'bilateral' : (!rNormal ? 'right' : 'left');
      abnormalItems.push(`reduced protective sensation by monofilament (${side})`);
    }
  }
  if (abnormalItems.length === 0) return [];

  const dxText = `Diabetic foot findings: ${abnormalItems.join(', ')}`;
  return [{
    text: dxText,
    sourceLabel: '足部檢查',
    sourceShort: 'Foot exam',
    sampledAt: section.date
  }];
}

// 多汗症 / sudomotor：若任一肢體 conductance <60µS → 提示自律神經異常
function parseSudomotorSection(section) {
  const text = section.text;
  // 抓 Left: NNµS / Right: NNµS
  const values = [];
  const re = /(Left|Right|L|R)\s*[:：]\s*(\d+(?:\.\d+)?)\s*[µu]S/gi;
  let m;
  while ((m = re.exec(text)) !== null) {
    values.push(parseFloat(m[2]));
  }
  if (values.length === 0) return [];
  const minVal = Math.min(...values);
  if (minVal >= 60) return [];   // 全部正常
  let severity;
  if (minVal < 40) severity = 'severely';
  else severity = 'moderately';
  return [{
    text: `${severity.charAt(0).toUpperCase() + severity.slice(1)} reduced sudomotor function (min ${minVal}µS, suggesting autonomic neuropathy)`,
    sourceLabel: '排汗神經',
    sourceShort: 'Sudomotor',
    sampledAt: section.date
  }];
}

// ─── Free-text 診斷整合與去重 ─────────────────────────────────────────
// 規範化文字以便比對：移除標點、grade/Grade、大小寫
function normDxText(s) {
  return s.toLowerCase()
    .replace(/[\s,，.。;；:：()()\[\]<>"'·]+/g, '')
    .replace(/grade[a-z0-9]+/g, '')   // 移除 grade A/B/I/II 後綴以便合併
    .trim();
}

// ─── Free-text 診斷 → ICD-10 對應表 ────────────────────────────────────
// 用 regex 比對診斷文字，找到第一個 match 就用該 ICD
// 順序很重要：specific 在前、generic 在後
const FREE_TEXT_ICD_MAP = [
  // ─ 甲狀腺 ─
  { pattern: /thyroidectomy/i,                 icd: 'Z90.6',   desc: 'Acquired absence of other endocrine glands' },
  { pattern: /thyroid\s+(nodule|nodules)/i,    icd: 'E04.1',   desc: 'Nontoxic single thyroid nodule' },
  { pattern: /thyroid\s+(cyst|cysts)/i,        icd: 'E04.1',   desc: 'Nontoxic thyroid nodule (cyst)' },
  { pattern: /thyroid\s+goiter/i,              icd: 'E04.9',   desc: 'Nontoxic goiter, unspecified' },
  { pattern: /hashimoto/i,                     icd: 'E06.3',   desc: 'Autoimmune thyroiditis' },
  { pattern: /graves/i,                        icd: 'E05.00',  desc: 'Thyrotoxicosis with diffuse goiter' },

  // ─ 肝膽 ─
  { pattern: /(fatty\s+liver|hepatic\s+steatosis|steatohepatitis)/i, icd: 'K76.0', desc: 'Fatty (change of) liver, not elsewhere classified' },
  { pattern: /liver\s+cirrhosis/i,             icd: 'K74.60',  desc: 'Unspecified cirrhosis of liver' },
  { pattern: /liver\s+(cyst|cysts)/i,          icd: 'K76.89',  desc: 'Other specified diseases of liver' },
  { pattern: /hemangioma.*liver|liver.*hemangioma/i, icd: 'D18.03', desc: 'Hemangioma of intra-abdominal structures' },
  { pattern: /gallbladder\s+(stone|stones)|cholelithiasis/i, icd: 'K80.20', desc: 'Calculus of gallbladder without cholecystitis' },
  { pattern: /gallbladder\s+polyp/i,           icd: 'K82.8',   desc: 'Other specified diseases of gallbladder' },
  { pattern: /(s\/?p\s+)?cholecystectomy/i,    icd: 'Z90.49',  desc: 'Acquired absence of other specified parts of digestive tract' },

  // ─ 腎臟泌尿 ─
  { pattern: /(renal|kidney)\s+(stone|stones|calculus|calculi)|nephrolithiasis/i, icd: 'N20.0', desc: 'Calculus of kidney' },
  { pattern: /(renal|kidney)\s+(cyst|cysts)/i, icd: 'N28.1',   desc: 'Cyst of kidney, acquired' },
  { pattern: /polycystic\s+kidney/i,           icd: 'Q61.3',   desc: 'Polycystic kidney, unspecified' },
  { pattern: /hydronephrosis/i,                icd: 'N13.30',  desc: 'Unspecified hydronephrosis' },
  { pattern: /bladder\s+stone/i,               icd: 'N21.0',   desc: 'Calculus in bladder' },

function lookupFreeTextIcd(dxText) {
  for (const entry of FREE_TEXT_ICD_MAP) {
    if (entry.pattern.test(dxText)) {
      return { icd10: entry.icd, icd10_desc: entry.desc };
    }
  }
  return null;
}

// 同診斷出現多次 → 合併、列出所有來源
function integrateFreeTextDx(items) {
  if (!items.length) return [];
  const grouped = {};
  for (const item of items) {
    const key = normDxText(item.text);
    if (!grouped[key]) {
      grouped[key] = {
        text: item.text,    // 保留第一次出現的原文
        sources: []
      };
    }
    grouped[key].sources.push({
      label: item.sourceLabel,
      short: item.sourceShort || item.sourceLabel,
      date: item.sampledAt
    });
  }
  const integrated = Object.values(grouped);
  const afterPathMerge = mergePathologyIntoEndoscopy(integrated);
  return mergeDiagnosesByICD(afterPathMerge);
}

// Raw 版本：只做 pathology+endoscopy 合併、不做同 ICD 合併
// 用於 Objective 區、按時間每次都列出
function integrateFreeTextDxRaw(items) {
  if (!items.length) return [];
  const grouped = {};
  for (const item of items) {
    // 注意：用「文字+日期」當 key（同診斷不同時間視為不同 entry）
    const key = `${normDxText(item.text)}|${item.sampledAt || ''}`;
    if (!grouped[key]) {
      grouped[key] = {
        text: item.text,
        sources: []
      };
    }
    grouped[key].sources.push({
      label: item.sourceLabel,
      short: item.sourceShort || item.sourceLabel,
      date: item.sampledAt
    });
  }
  const integrated = Object.values(grouped);
  // 只跑 pathology+endoscopy 合併、不跑 ICD 合併
  return mergePathologyIntoEndoscopy(integrated);
}

// 從診斷文字抽出嚴重程度/分級（嚴格、僅明確的等級才抽）
function extractSeverity(text) {
  // LA grade A/B/C/D — 保留原文「LA grade B」
  let m = text.match(/\bLA[\s\-]*grade\s+([A-D])\b/i);
  if (m) return `LA grade ${m[1].toUpperCase()}`;
  // 「LA-A」「LA-B」這種寫法 → 還原成「LA grade B」
  m = text.match(/\bLA[\-\s]+([A-D])\b/i);
  if (m) return `LA grade ${m[1].toUpperCase()}`;
  // grade A/B/C/D 或 grade I/II/III/IV
  m = text.match(/\bgrade\s+([A-D]|I{1,4}V?|[1-4])\b/i);
  if (m) return `grade ${m[1].toUpperCase()}`;
  // BIRADs category 1-5
  m = text.match(/BIRADs?\s+category\s+([1-5])/i);
  if (m) return `BIRADs ${m[1]}`;
  // mild / moderate / severe（明確嚴重度形容詞）
  m = text.match(/\b(mild|moderate|severe)\b/i);
  if (m) return m[1].toLowerCase();
  // (suspected) (suspect)
  if (/\(suspect(?:ed)?\)/i.test(text)) return 'suspected';
  // 注意：chronic / hyperplastic / suppurative / acute 不算 severity（是 type 或描述）
  return null;
}

// 計算診斷的「具體度分數」— 越高越具體（用於合併時選最佳文字）
function diagnosisSpecificity(dx) {
  let score = 0;
  const text = dx.text.toLowerCase();
  // 病理確認 +3
  if (/pathology|biopsy/.test(text)) score += 3;
  // 具體形容詞 +2 (acute, severe, suppurative, grade B/C/D)
  if (/\b(acute|severe|suppurative|grade\s+[bcd])\b/i.test(text)) score += 2;
  // mild / suspected / mild / grade A -1（較不嚴重/不確定）
  if (/\b(mild|grade\s+a|suspect)/i.test(text)) score -= 1;
  // 文字長度也算 (越長通常越具體)
  score += Math.min(text.length / 30, 3);
  // 最新日期加分
  const latestDate = [...dx.sources].sort((a, b) => (b.date || '').localeCompare(a.date || ''))[0]?.date;
  if (latestDate) {
    const year = parseInt(latestDate.slice(0, 4));
    score += (year - 2000) * 0.01;  // 新的小幅加分
  }
  return score;
}

// 抽出診斷文字中的「位置」前綴（用於避免左右病灶合併）
function extractLocation(text) {
  // Left/Right/Bilateral/L't/R't 等
  const m = text.match(/^\s*(Left|Right|Bilateral|Bil\.?|L'?t|R'?t)\b/i);
  if (m) {
    const word = m[1].toLowerCase().replace(/[.'`]/g, '');
    if (word === 'lt' || word === 'l') return 'left';
    if (word === 'rt' || word === 'r') return 'right';
    if (word === 'bil' || word === 'bilateral') return 'bilateral';
    return word;  // left/right
  }
  return null;
}

// 同 ICD 的診斷合併成一條、保留歷史 occurrences (日期+severity)
// 注意：不同位置（Left vs Right）不合併
function mergeDiagnosesByICD(items) {
  const byKey = new Map();
  const noIcd = [];
  for (const item of items) {
    const icd = lookupFreeTextIcd(item.text);
    if (!icd) {
      noIcd.push(item);
      continue;
    }
    const location = extractLocation(item.text);
    // 加位置到 key、不同位置不合
    const key = `${icd.icd10}|${location || ''}`;
    if (!byKey.has(key)) {
      byKey.set(key, { icd, items: [] });
    }
    byKey.get(key).items.push(item);
  }

  const result = [];
  for (const [_key, group] of byKey) {
    if (group.items.length === 1) {
      result.push(group.items[0]);
      continue;
    }
    // 多個同 ICD + 同位置 → 合併
    const sorted = [...group.items].sort((a, b) => diagnosisSpecificity(b) - diagnosisSpecificity(a));
    const primary = sorted[0];
    const occurrences = group.items.map(item => {
      const dates = item.sources.map(s => s.date).filter(Boolean).sort();
      const date = dates[0] || null;
      const severity = extractSeverity(item.text);
      return { date, severity, text: item.text };
    }).sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    // 去重複的「年/月」組合（同月不同 source 不重複顯示）
    const seenMonth = new Set();
    const uniqueOcc = occurrences.filter(o => {
      const month = (o.date || '').slice(0, 7);
      if (seenMonth.has(month)) return false;
      seenMonth.add(month);
      return true;
    });
    const allSources = group.items.flatMap(i => i.sources);
    result.push({
      text: primary.text,
      sources: allSources,
      occurrences: uniqueOcc,
    });
  }
  return [...result, ...noIcd];
}

// Pathology / 細胞學 short 配對 目標 procedure（同檢體的母檢查）
// value 物件：{ target: 對應的 procedure short, prefix: 合併時用的字串, maxDays: 配對窗口（天） }
const PATHOLOGY_TO_PROCEDURE_MAP = {
  'Colon Pathology':  { target: 'Colonoscopy',  prefix: 'pathology', maxDays: 31 },
  'EGD Pathology':    { target: 'EGD',          prefix: 'pathology', maxDays: 31 },
  'Thy Pathology':    { target: 'Thy FNA',      prefix: 'pathology', maxDays: 31 },
  'Breast Pathology': { target: 'Breast FNA',   prefix: 'pathology', maxDays: 31 },
  'Skin Pathology':   { target: 'Skin US',      prefix: 'pathology', maxDays: 31 },
  // 細胞學配影像（甲狀腺 FNA 結果合到 Thy Echo 的結節那條）
  'Thy FNA':          { target: 'Thy Echo',     prefix: 'FNA',       maxDays: 365 },
  'Breast FNA':       { target: 'Breast Echo',  prefix: 'FNA',       maxDays: 365 },
};
// 保留原本物件給其他地方查（過濾 source tag 用）
const PATHOLOGY_TO_PROCEDURE = Object.fromEntries(
  Object.entries(PATHOLOGY_TO_PROCEDURE_MAP).map(([k, v]) => [k, v.target])
);

// 把 pathology / 細胞學 診斷合併到對應的內視鏡/影像診斷
// 例如 "Colonic polyp" (2025/02 Colonoscopy) + "Non-specific colitis" (2025/02 Colon Pathology)
//   → "Colonic polyp, pathology: Non-specific colitis" (2025/02 Colonoscopy)
function mergePathologyIntoEndoscopy(items) {
  // 把 items 分成「pathology/cytology」和「procedure」
  const pathologyItems = [];   // 要合進別人的
  const procedureItems = [];   // 主檢查（被合進來的）
  const otherItems = [];

  for (const item of items) {
    const primarySrc = [...item.sources].sort((a, b) => (b.date || '').localeCompare(a.date || ''))[0];
    const short = primarySrc.short;
    if (short in PATHOLOGY_TO_PROCEDURE_MAP) {
      const cfg = PATHOLOGY_TO_PROCEDURE_MAP[short];
      pathologyItems.push({ item, primarySrc, cfg });
    } else if (Object.values(PATHOLOGY_TO_PROCEDURE_MAP).some(c => c.target === short)) {
      procedureItems.push({ item, primarySrc, short });
    } else {
      otherItems.push(item);
    }
  }

  // 合併：每個 pathology 找對應 procedure
  // 優先配「polyp / mass / lesion / nodule」等有切片價值的、不要配 diverticulum
  const usedPathology = new Set();
  const procPriority = (item) => {
    const t = item.text.toLowerCase();
    if (/polyp|mass|tumor|nodule|lesion|biops|ulcer|cyst/.test(t)) return 0;
    if (/diverticul|gastritis|colitis|esophagitis/.test(t)) return 2;
    return 1;
  };

  // 配對判斷：依 maxDays 比較日期差
  function inWindow(dateA, dateB, maxDays) {
    if (!dateA || !dateB) return false;
    const ta = new Date(dateA).getTime();
    const tb = new Date(dateB).getTime();
    if (isNaN(ta) || isNaN(tb)) return false;
    const diffDays = Math.abs(ta - tb) / (1000 * 60 * 60 * 24);
    return diffDays <= maxDays;
  }

  for (const proc of procedureItems.slice().sort((a, b) => procPriority(a.item) - procPriority(b.item))) {
    const matchingPaths = pathologyItems.filter(p => {
      if (usedPathology.has(p.item)) return false;
      if (p.cfg.target !== proc.short) return false;
      return inWindow(p.primarySrc.date, proc.primarySrc.date, p.cfg.maxDays);
    });
    if (matchingPaths.length === 0) continue;
    // 用每個 path 的 prefix 串成合併字串
    // 若所有 path 用同 prefix，合成「procText, prefix: pathTexts」
    // 若 prefix 不同，個別串接
    // 文字自動去重（不分大小寫）
    const byPrefix = new Map();
    for (const p of matchingPaths) {
      if (!byPrefix.has(p.cfg.prefix)) byPrefix.set(p.cfg.prefix, []);
      byPrefix.get(p.cfg.prefix).push(p.item.text);
    }
    let mergedText = proc.item.text;
    for (const [prefix, texts] of byPrefix) {
      // 去重複：同一段 prefix 內，文字一樣的（不分大小寫）合併
      const seenLower = new Set();
      const uniqueTexts = texts.filter(t => {
        const lo = t.toLowerCase().trim();
        if (seenLower.has(lo)) return false;
        seenLower.add(lo);
        return true;
      });
      mergedText += `, ${prefix}: ${uniqueTexts.join(', ')}`;
    }
    proc.item.text = mergedText;
    for (const p of matchingPaths) {
      proc.item.sources.push(...p.item.sources);
      usedPathology.add(p.item);
    }
  }

  // 組合
  const result = [
    ...procedureItems.map(p => p.item),
    ...pathologyItems.filter(p => !usedPathology.has(p.item)).map(p => p.item),
    ...otherItems
  ];
  return result;
}

// 清掉 LIS 網頁的 navigation/目錄樹/分頁 noise
function sanitizeLISNoise(text) {
  // 移除目錄樹條目：「摺疊 XXX (N)」「展開 XXX (N)」「略過巡覽連結。」
  text = text.replace(/^[ \t]*(?:摺疊|展開)\s+[\s\S]*?\(\d+\)[ \t]*$/gm, '');
  text = text.replace(/^略過巡覽連結。?[ \t]*$/gm, '');
  // 移除分頁工具列：「最前頁   前一頁   第 X / Y 頁   下一頁   最後頁   總筆數： N」
  text = text.replace(/^[ \t]*最前頁\s+前一頁[\s\S]*?總筆數[：:]\s*\d+[ \t]*$/gm, '');
  // 移除查詢條件頭
  text = text.replace(/^查詢條件[ \t]*$/gm, '');
  text = text.replace(/^(?:起始日|結束日)[：:][ \t]*$/gm, '');
  text = text.replace(/^[ \t]*提交[ \t]*$/gm, '');
  text = text.replace(/^[ \t]*(?:二年|一年|六月|三月|門\s*診|急\s*診|住\s*院)(?:\s*\|\s*(?:二年|一年|六月|三月|門\s*診|急\s*診|住\s*院))+[ \t]*$/gm, '');
  text = text.replace(/^累加顯示[ \t]*$/gm, '');
  text = text.replace(/^依表單\s+依類別\s+依日期[ \t]*$/gm, '');
  // 移除側邊工具列頭
  text = text.replace(/^計算機[ \t]*$/gm, '');
  text = text.replace(/^數據判讀參考資料[ \t]*$/gm, '');
  text = text.replace(/^病理部網頁\(?[^)]*\)?[ \t]*$/gm, '');
  text = text.replace(/^外科病理研究委託申請表單[ \t]*$/gm, '');
  text = text.replace(/^查詢結果[ \t]*$/gm, '');
  return text;
}

function parseLIS(text) {
  // 先清掉 LIS 網頁的目錄樹/Navigation/分頁 noise
  text = sanitizeLISNoise(text);

  const demographics = parseDemographics(text);
  const sections = splitReports(text);
  const allResults = [];
  const freeTextItems = [];
  const skipped = [];

  for (const sec of sections) {
    if (sec.isPending) {
      const itemMatches = [...sec.text.matchAll(/項目名稱[：:]\s*(.+?)(?:\s*　　|\s{2,}|\n|$)/g)];
      skipped.push({
        type: sec.type,
        items: itemMatches.map(m => m[1].trim()).filter(Boolean)
      });
      continue;
    }

    // 動脈硬化（ABI/PWV）— 走特殊解析回到數值類
    // 注意：不再從同一份報告抓 free-text「醫師診斷」，因為 PWV/ABI 數值會經由
    // arterial_stiffness / pad_suspected 規則自動生成診斷，free-text 重複沒意義
    if (/動脈硬化檢查|肱踝動脈|足踝肱動脈/.test(sec.text)) {
      allResults.push(...parseSpecialSection(sec));
      continue;
    }

    // 細菌培養
    if (/細菌檢查報告|培養|Culture/i.test(sec.type)) {
      freeTextItems.push(...parseCultureSection(sec));
      continue;
    }

    // Free-text 報告（內視鏡、病理、影像…）
    const ftType = detectFreeTextType(sec.type);
    if (ftType) {
      // 家醫部特殊檢查可能是眼底/足部/多汗症之類有特定格式的子類型
      if (ftType.label === '家醫部') {
        const subtype = detectFMSubtype(sec.text);
        if (subtype === 'fundus')    { freeTextItems.push(...parseFundusSection(sec));    continue; }
        if (subtype === 'foot')      { freeTextItems.push(...parseFootSection(sec));      continue; }
        if (subtype === 'sudomotor') { freeTextItems.push(...parseSudomotorSection(sec)); continue; }
      }
      freeTextItems.push(...parseFreeTextSection(sec, ftType));
      continue;
    }

    // 標準表格報告
    const r = parseTableSection(sec);
    if (r) allResults.push(...r);
  }

  // 去重整合 free-text 診斷
  const freeTextDx = integrateFreeTextDx(freeTextItems);
  // 也產生「未合併」版本給 Objective 用（按時間列出每次檢查）
  const freeTextDxRaw = integrateFreeTextDxRaw(freeTextItems);

  // 分離出 unknown items（字典未收錄）— 不進入 integrate / dx 流程
  const knownResults = allResults.filter(r => !r.unknown);
  const unknownResults = allResults.filter(r => r.unknown);
  // 去重 unknown（同名只列一次）
  const unknownByKey = {};
  for (const r of unknownResults) {
    if (!unknownByKey[r.key]) unknownByKey[r.key] = r;
  }
  const unknownUnique = Object.values(unknownByKey);

  return { results: knownResults, skipped, demographics, freeTextDx, freeTextDxRaw, unknown: unknownUnique };
}

function classifyResult(item, sex) {
  if (item.unknown) return '?';  // 字典未收錄，無法判斷
  const def = item.def;
  if (def.is_qual) {
    const negs = (def.qual_neg || []).map(s => norm(s));
    const q = norm(item.qual || '');
    if (negs.includes(q) || q === '' || q === 'normal') return 'OK';
    return 'H';
  }
  if (item.num === null) return '?';
  if (def.crit_low != null && item.num <= def.crit_low) return 'LL';
  if (def.crit_high != null && item.num >= def.crit_high) return 'HH';
  // 優先用報告自己的 ref（解析自檢驗單的參考區間欄位），沒有才用字典預設
  const ref = item.reportRef || getRef(def, sex);
  if (!ref) return '?';
  const [lo, hi] = ref;
  // Range-form 結果（e.g. "0~5 (9.0)" → range=[0,5]）：用範圍上限與 ref 上限比較
  // 因為括號內的定量值單位通常與 ref 不同（/µL vs /HPF），看分類即可
  if (item.range) {
    const rHi = item.range[1];
    if (def.direction === 'low_bad') return item.range[0] < lo ? 'L' : 'OK';
    if (rHi > hi) return 'H';
    if (item.range[0] < lo) return 'L';
    return 'OK';
  }
  if (def.direction === 'low_bad') return item.num < lo ? 'L' : 'OK';
  if (item.num < lo) return 'L';
  if (item.num > hi) return 'H';
  return 'OK';
}

function integrateTimeline(allResults, sex) {
  for (const r of allResults) r.flag = classifyResult(r, sex);
  const byKey = {};
  for (const r of allResults) {
    if (!byKey[r.key]) byKey[r.key] = [];
    byKey[r.key].push(r);
  }
  // Dedupe same-date readings
  for (const key of Object.keys(byKey)) {
    const byDate = {};
    for (const r of byKey[key]) {
      const d = r.sampledAt || '?';
      if (!byDate[d]) { byDate[d] = r; continue; }
      const cur = byDate[d];
      const curScore = (cur.capped ? 0 : 2) + (cur.num != null ? 1 : 0);
      const newScore = (r.capped ? 0 : 2) + (r.num != null ? 1 : 0);
      if (newScore > curScore) byDate[d] = r;
    }
    byKey[key] = Object.values(byDate);
  }
  const integrated = [];
  for (const [key, arr] of Object.entries(byKey)) {
    arr.sort((a, b) => {
      const da = a.sampledAt || '0000-00-00';
      const db = b.sampledAt || '0000-00-00';
      return db.localeCompare(da);
    });
    const latest = arr[0];
    const olderAbnormal = arr.slice(1).find(r => r.flag !== 'OK' && r.flag !== '?');
    if (latest.flag === 'OK' && !olderAbnormal) continue;
    if (latest.flag === '?' && !olderAbnormal) continue;
    integrated.push({
      ...latest,
      pastAbnormal: (latest.flag === 'OK' && olderAbnormal) ? olderAbnormal : null,
      allReadings: arr
    });
  }
  return integrated;
}

function getReading(integrated, itemKey) {
  return integrated.find(r => r.key === itemKey);
}

function evaluateCriterion(crit, integrated) {
  const reading = getReading(integrated, crit.item);
  if (!reading) return { met: false };
  const useReading = (reading.flag !== 'OK' && reading.flag !== '?')
    ? reading : reading.pastAbnormal;
  if (!useReading) return { met: false };
  const num = useReading.num;
  let met = false;
  switch (crit.op) {
    case '>':  met = num != null && num >  crit.value; break;
    case '>=': met = num != null && num >= crit.value; break;
    case '<':  met = num != null && num <  crit.value; break;
    case '<=': met = num != null && num <= crit.value; break;
    case '==': met = num != null && num === crit.value; break;
    case 'between':
      met = num != null && num >= crit.value[0] && num <= crit.value[1]; break;
    case 'out_of_ref':
      met = ['H','L','HH','LL'].includes(useReading.flag); break;
    case 'above_ref':
      met = useReading.flag === 'H' || useReading.flag === 'HH'; break;
    case 'below_ref':
      met = useReading.flag === 'L' || useReading.flag === 'LL'; break;
    case 'qual_positive':
      met = useReading.flag === 'H' || useReading.flag === 'HH'; break;
  }
  return { met, reading: useReading };
}

function applyDiagnosisRules(integrated) {
  const triggered = [];
  const triggeredIds = new Set();
  for (const rule of DX_RULES.rules) {
    if (rule.exclude_if && rule.exclude_if.some(id => triggeredIds.has(id))) continue;
    const evals = rule.criteria.map(c => ({ crit: c, ...evaluateCriterion(c, integrated) }));
    const ok = rule.logic === 'all' ? evals.every(e => e.met) : evals.some(e => e.met);
    if (ok) {
      const evidence = evals.filter(e => e.met).map(e => e.reading);
      triggered.push({ rule, evidence });
      triggeredIds.add(rule.id);
    }
  }
  // 動態分級：依當下數值微調 rule.name / rule.icd10
  return triggered.map(t => {
    if (t.rule.id === 'ckd')               return refineCkdStage(t, integrated);
    if (t.rule.id === 'diabetes_mellitus') return refineDmCode(t, integrated);
    return t;
  });
}

// CKD 自動分級（依 eGFR）
function refineCkdStage(triggered, integrated) {
  const egfrItem = integrated.find(it => it.key === 'eGFR');
  const egfr = egfrItem ? egfrItem.num : null;
  if (egfr == null) return triggered;  // 無 eGFR：用原本 N18.9

  let stageLabel, icd10, icdDesc;
  if (egfr >= 90)      { stageLabel = 'stage G1 (≥90)';   icd10 = 'N18.1';  icdDesc = 'CKD stage 1'; }
  else if (egfr >= 60) { stageLabel = 'stage G2 (60–89)'; icd10 = 'N18.2';  icdDesc = 'CKD stage 2 (mild)'; }
  else if (egfr >= 45) { stageLabel = 'stage G3a (45–59)';icd10 = 'N18.30'; icdDesc = 'CKD stage 3a (mild-moderate)'; }
  else if (egfr >= 30) { stageLabel = 'stage G3b (30–44)';icd10 = 'N18.32'; icdDesc = 'CKD stage 3b (moderate-severe)'; }
  else if (egfr >= 15) { stageLabel = 'stage G4 (15–29)'; icd10 = 'N18.4';  icdDesc = 'CKD stage 4 (severe)'; }
  else                 { stageLabel = 'stage G5 (<15)';   icd10 = 'N18.5';  icdDesc = 'CKD stage 5'; }

  // G1/G2 必須有蛋白尿才算 CKD；無蛋白尿不升級（但既然規則已觸發，代表 UACR 或臨床判斷已支持，仍標示）
  return {
    ...triggered,
    rule: {
      ...triggered.rule,
      name: 'Chronic kidney disease, ' + stageLabel,
      icd10, icd10_desc: icdDesc
    }
  };
}

// DM 自動分級（A1c ≥ 9 視為 with hyperglycemia）
function refineDmCode(triggered, integrated) {
  const a1cItem = integrated.find(it => it.key === 'HbA1c');
  const a1c = a1cItem ? a1cItem.num : null;
  if (a1c == null || a1c < 9) return triggered;  // 預設 E11.9
  return {
    ...triggered,
    rule: {
      ...triggered.rule,
      name: 'Diabetes mellitus, with hyperglycemia',
      icd10: 'E11.65',
      icd10_desc: 'Type 2 diabetes mellitus with hyperglycemia'
    }
  };
}
