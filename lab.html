// UI
// ═══════════════════════════════════════════════════════════════

const $ = id => document.getElementById(id);
const state = {
  sex: 'M',
  demographics: { name: null, chartNo: null, sex: null, age: null, birthDate: null },
  allResults: [],
  integrated: [],
  skipped: [],
  dx: [],
  freeTextDx: [],
  unknown: []
};

function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function fmtDate(iso) {
  if (!iso) return '';
  const m = iso.match(/(\d{4})-(\d{2})-(\d{2})/);
  return m ? `${m[1]}/${m[2]}/${m[3]}` : iso;
}

// 報告類型 → 簡短分組名
function labGroupName(sourceType) {
  if (!sourceType) return '其他';
  if (/尿液|胃液/.test(sourceType)) return '尿液';
  if (/一般.*血液|血液檢驗.*一般/.test(sourceType)) return 'CBC';
  if (/緊急.*血液|凝血/.test(sourceType)) return '凝血';
  if (/核醫科免疫/.test(sourceType)) return '核醫';
  if (/血清免疫/.test(sourceType)) return '血清';
  if (/特殊生化/.test(sourceType)) return '特殊生化';
  if (/緊急生化/.test(sourceType)) return '生化';
  if (/自動化生化|生化/.test(sourceType)) return '生化';
  if (/微生物|細菌培養/.test(sourceType)) return '培養';
  return sourceType.replace(/檢驗報告|檢查報告|門診|報告/g, '').trim() || '其他';
}

function fmtYearMonth(iso) {
  if (!iso) return '';
  const m = iso.match(/(\d{4})-(\d{2})/);
  return m ? `${m[1]}/${m[2]}` : iso;
}

function displayValue(item) {
  // Compose the display string preferring qual when meaningful
  if (item.def && item.def.is_qual) return item.qual || (item.num != null ? String(item.num) : '—');
  if (item.qual && /[~+]/.test(item.qual)) return item.qual;  // ranges like "3~5", "2+"
  if (item.num != null) return String(item.num);
  return item.qual || '—';
}

function runParse() {
  const text = $('labInput').value;
  if (!text.trim()) {
    showToast('請先貼上 LIS 報告');
    return;
  }
  const { results, skipped, demographics, freeTextDx, freeTextDxRaw, unknown } = parseLIS(text);
  state.demographics = demographics;
  state.sex = demographics.sex || 'M';  // 沒抓到就預設男（影響極小）
  state.allResults = results;
  state.integrated = integrateTimeline(results, state.sex);
  state.skipped = skipped;
  state.dx = applyDiagnosisRules(state.integrated);
  state.freeTextDx = freeTextDx || [];
  state.freeTextDxRaw = freeTextDxRaw || [];
  state.unknown = unknown || [];
  renderResults(results.length);
}

function renderResults(totalParsed) {
  const objArea = $('objArea');
  const dxArea = $('dxArea');
  const resultGrid = $('resultGrid');
  const emptyState = $('emptyState');
  const warningBanner = $('warningBanner');

  // 無法辨識：顯示錯誤、不收合輸入區、不顯示 grid
  if (totalParsed === 0 && state.skipped.length === 0) {
    emptyState.style.display = '';
    emptyState.innerHTML = `<div class="big">😕</div>無法辨識任何檢驗項目。<br>請確認貼上的是完整的成大 LIS 報告內容。`;
    resultGrid.style.display = 'none';
    warningBanner.style.display = 'none';
    // 不收合輸入區
    return;
  }

  // 解析成功：隱藏 emptyState、顯示結果 grid
  emptyState.style.display = 'none';
  resultGrid.style.display = '';

  // 滑到病人資訊（或結果區）位置 — 讓元素出現在視窗上方約 1/5 位置，留空間給輸入區尾巴
  setTimeout(() => {
    const target = $('patientInfo') && $('patientInfo').style.display !== 'none' ? $('patientInfo') : resultGrid;
    if (target) {
      const rect = target.getBoundingClientRect();
      const targetTop = window.scrollY + rect.top;
      const offset = window.innerHeight * 0.18;  // 留視窗上方 18% 高度
      window.scrollTo({ top: targetTop - offset, behavior: 'smooth' });
    }
  }, 50);

  // ── 渲染病人資訊（獨立區、結果 grid 之上） ──
  const patientInfo = $('patientInfo');
  const d = state.demographics;
  if (d.name || d.chartNo || d.age != null || d.sex) {
    const sexLabel = d.sex === 'M' ? '男' : d.sex === 'F' ? '女' : '—';
    const ageLabel = d.age != null ? `${d.age} 歲` : '—';
    patientInfo.innerHTML = `
      <div class="pt-context">
        ${d.name ? `<span class="pt-field"><span class="pt-label">姓名</span><span class="pt-val">${escHtml(d.name)}</span></span>` : ''}
        ${d.chartNo ? `<span class="pt-field"><span class="pt-label">病歷號</span><span class="pt-val mono">${escHtml(d.chartNo)}</span></span>` : ''}
        <span class="pt-field"><span class="pt-label">性別</span><span class="pt-val">${sexLabel}</span></span>
        <span class="pt-field"><span class="pt-label">年齡</span><span class="pt-val">${ageLabel}</span></span>
      </div>
    `;
    patientInfo.style.display = '';
  } else {
    patientInfo.style.display = 'none';
  }

  // ── 渲染 Objective 到 objArea（合成單一連續區、不分兩個 box） ──
  let objHtml = '';
  const totalObjCount = state.integrated.length + state.freeTextDxRaw.length;

  // 複製按鈕（全部 + 僅現異常）
  if (totalObjCount > 0) {
    objHtml += `<div class="section-copy-bar">
      <button class="btn small" id="copyObjCurBtn" title="僅複製目前 H/L 異常的 lab + 所有 free-text 報告">僅現異常</button>
      <button class="btn primary small" id="copyObjBtn">全部複製</button>
    </div>`;
  }

  if (totalObjCount === 0) {
    if (totalParsed > 0) {
      objHtml += `<div style="text-align:center;color:var(--accent-green);padding:20px">
        ✓ 所有解析項目均在正常範圍
      </div>`;
    }
  } else {
    // 合一：lab values + free-text 都在同一個外層 box、單一滾輪
    objHtml += `<div class="objective-box" id="objBox">`;

    // 數值表 — 依採檢日期 + 檢查類型分組
    if (state.integrated.length > 0) {
      const labGroups = new Map();
      for (const item of state.integrated) {
        const dateKey = (item.sampledAt || '').slice(0, 10);
        const sourceGroup = labGroupName(item.sourceType);
        const key = `${dateKey}|${sourceGroup}`;
        if (!labGroups.has(key)) {
          labGroups.set(key, { date: dateKey, group: sourceGroup, items: [] });
        }
        labGroups.get(key).items.push(item);
      }
      const sortedGroups = [...labGroups.values()].sort((a, b) => (b.date || '').localeCompare(a.date || ''));

      for (const grp of sortedGroups) {
        objHtml += `<div class="obj-group">
          <div class="obj-group-header">
            <span class="obj-group-date">${fmtDate(grp.date)}</span>
            <span class="obj-group-type">${escHtml(grp.group)}</span>
          </div>
        `;
        for (const item of grp.items) {
          const flag = item.flag;
          const valCls = (flag === 'H' || flag === 'HH') ? 'high'
                       : (flag === 'L' || flag === 'LL') ? 'low' : '';
          const critCls = (flag === 'HH' || flag === 'LL') ? ' crit' : '';
          const flagBadge = `<span class="flag ${flag.toLowerCase()}">${flag === 'HH' ? 'H!' : flag === 'LL' ? 'L!' : flag}</span>`;
          const value = displayValue(item);
          const unit = (item.def && item.def.unit) ? ` ${item.def.unit}` : '';

          let pastMeta = '';
          if (item.pastAbnormal) {
            const pv = displayValue(item.pastAbnormal);
            pastMeta = `<span class="past">⚠ 曾異常 ${escHtml(pv)} (${fmtDate(item.pastAbnormal.sampledAt)})</span>`;
          }

          objHtml += `
            <div class="obj-row grouped">
              <span class="name">${escHtml(item.key)}</span>
              <span class="value ${valCls}${critCls}">${escHtml(value)}${escHtml(unit)}</span>
              <span>${flagBadge}</span>
              <span class="meta">${pastMeta}</span>
            </div>
          `;
        }
        objHtml += `</div>`;
      }
    }

    // Free-text 報告列表 — 依日期+short 分組（合在同一外層 box，跟 lab values 接續）
    // 注意：Objective 用 freeTextDxRaw（未合併、按時間每次列出）
    if (state.freeTextDxRaw.length > 0) {
      const ftGroups = new Map();
      for (const dx of state.freeTextDxRaw) {
        const sourcesSorted = [...dx.sources].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
        const primary = sourcesSorted[0];
        const dateKey = (primary.date || '').slice(0, 7);
        const shortKey = primary.short || 'Other';
        const key = `${dateKey}|${shortKey}`;
        if (!ftGroups.has(key)) {
          ftGroups.set(key, { date: dateKey, short: shortKey, items: [] });
        }
        ftGroups.get(key).items.push(dx);
      }
      const sortedFtGroups = [...ftGroups.values()].sort((a, b) => (b.date || '').localeCompare(a.date || ''));

      for (const grp of sortedFtGroups) {
        objHtml += `<div class="ft-group">
          <div class="ft-group-header">
            <span class="ft-group-date">${fmtYearMonth(grp.date)}</span>
            <span class="ft-group-short">${escHtml(grp.short)}</span>
          </div>
        `;
        for (const dx of grp.items) {
          objHtml += `
            <div class="ft-row grouped">
              <span class="ft-text">${escHtml(dx.text)}</span>
            </div>
          `;
        }
        objHtml += `</div>`;
      }
    }
  }
  objHtml += `</div>`;
  objArea.innerHTML = objHtml;

  // ── 異常但未自動診斷的資料準備（用於上方 warning banner） ──
  const usedKeysInDx = new Set();
  state.dx.forEach(dx => dx.evidence.forEach(ev => usedKeysInDx.add(ev.key)));
  const unassignedAbnormal = state.integrated.filter(item => {
    const flag = item.flag || (item.latest && item.latest.flag);
    const isAbn = flag === 'H' || flag === 'HH' || flag === 'L' || flag === 'LL';
    if (!isAbn) return false;
    if (usedKeysInDx.has(item.key)) return false;
    if (item.def && item.def.is_qual && (item.qual || '').toLowerCase().includes('non-reactive')) return false;
    return true;
  });
  const seenUnaKeys = new Set();
  const unassignedUnique = unassignedAbnormal.filter(item => {
    if (seenUnaKeys.has(item.key)) return false;
    seenUnaKeys.add(item.key);
    return true;
  });

  // ── 渲染上方 warning banner ──
  const hasUnassigned = unassignedUnique.length > 0 || state.unknown.length > 0;
  if (hasUnassigned) {
    const total = unassignedUnique.length + state.unknown.length;
    let parts = [];
    if (unassignedUnique.length > 0) {
      parts.push(`<span class="warning-banner-group"><span class="warning-banner-label">Objective 已列、未自動診斷</span> ${unassignedUnique.map(item => `<span class="warning-banner-chip">${escHtml(item.key)}</span>`).join('<span class="warning-banner-sep">·</span>')}</span>`);
    }
    if (state.unknown.length > 0) {
      parts.push(`<span class="warning-banner-group"><span class="warning-banner-label">未列出（字典未收錄）</span> ${state.unknown.map(item => `<span class="warning-banner-chip unknown" title="原始值：${escHtml(item.valueCell || '')}">${escHtml(item.key)}</span>`).join('<span class="warning-banner-sep">·</span>')}</span>`);
    }
    warningBanner.className = 'warning-banner';
    warningBanner.innerHTML = `
      <span class="warning-banner-warn">⚠ 共 ${total} 項請醫師確認</span>
      ${parts.join('<span class="warning-banner-group-sep">　</span>')}
    `;
    warningBanner.style.display = '';
  } else {
    warningBanner.style.display = 'none';
  }

  // ── 渲染 Diagnosis 到 dxArea ──
  let dxHtml = '';
  const totalDxCount = state.dx.length + state.freeTextDx.length;

  // 複製按鈕（全部 + 僅現異常）
  if (totalDxCount > 0) {
    dxHtml += `<div class="section-copy-bar">
      <button class="btn small" id="copyDxCurBtn" title="僅複製目前 H/L 異常的 lab 觸發診斷 + 所有 free-text 診斷">僅現異常</button>
      <button class="btn primary small" id="copyDxBtn">全部複製</button>
    </div>`;
  }

  if (totalDxCount === 0) {
    if (state.integrated.length > 0) {
      dxHtml += `<div style="text-align:center;color:var(--text-muted);padding:20px">
        異常項目未觸發任何預設診斷規則
      </div>`;
    }
  } else {
    dxHtml += `<div class="dx-table" id="dxTable">`;
    let idx = 1;

    // 數值型診斷
    state.dx.forEach(dx => {
      const evList = dx.evidence.map(ev => {
        const isPast = state.integrated.find(it => it.key === ev.key && it.pastAbnormal === ev);
        const pastTag = isPast ? `<span class="past-prefix">曾異常</span>` : '';
        const valCls = (ev.flag === 'L' || ev.flag === 'LL') ? 'low' : '';
        return `<span class="evidence-row"><span class="ev-date">${fmtDate(ev.sampledAt)}</span> ${pastTag}<span class="ev-item">${escHtml(ev.key)}:</span> <span class="ev-value ${valCls}">${escHtml(displayValue(ev))}</span></span>`;
      }).join('');

      dxHtml += `
        <div class="dx-row">
          <div class="dx-left">
            <span class="num">${idx}.</span>
            <span>${escHtml(dx.rule.name)}${dx.rule.icd10 ? ` <span class="icd-tag" title="${escHtml(dx.rule.icd10_desc || '')}">${escHtml(dx.rule.icd10)}</span>` : ''}</span>
          </div>
          <div class="dx-right">
            <div class="dx-right-label">佐證數值（不複製）</div>
            ${evList}
          </div>
        </div>
      `;
      idx++;
    });

    // Free-text 診斷
    state.freeTextDx.forEach(dx => {
      const sortedSources = [...dx.sources].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      const tagSources = sortedSources.filter(s => !(s.short in PATHOLOGY_TO_PROCEDURE));
      const seen = new Set();
      const uniqueTagSources = tagSources.filter(s => {
        const k = `${fmtYearMonth(s.date)}|${s.short}`;
        if (seen.has(k)) return false;
        seen.add(k);
        return true;
      });
      const tag = uniqueTagSources.map(s => `${fmtYearMonth(s.date)} ${s.short}`).join(' / ');
      const srcList = sortedSources.map(s =>
        `<span class="evidence-row"><span class="ev-date">${fmtYearMonth(s.date)}</span> <span class="ev-source">${escHtml(s.label)}</span></span>`
      ).join('');
      const icdInfo = lookupFreeTextIcd(dx.text);
      const icdHtml = icdInfo
        ? ` <span class="icd-tag" title="${escHtml(icdInfo.icd10_desc)}">${escHtml(icdInfo.icd10)}</span>`
        : '';

      // occurrences chips（多次出現的歷史 [日期 + severity]）
      let occHtml = '';
      if (dx.occurrences && dx.occurrences.length > 1) {
        const chips = dx.occurrences.map(o => {
          const dateStr = fmtYearMonth(o.date);
          const sevStr = o.severity ? ` ${escHtml(o.severity)}` : '';
          return `<span class="occ-chip">${dateStr}${sevStr}</span>`;
        }).join('');
        occHtml = ` <span class="occ-chips">${chips}</span>`;
      }

      // dx-tag (灰色「(日期 來源)」) — 合併版（有 occurrences）就不顯示、因為已被 occ chips 取代且重複
      const showDxTag = !(dx.occurrences && dx.occurrences.length > 1);
      const dxTagHtml = showDxTag ? ` <span class="dx-tag">(${escHtml(tag)})</span>` : '';

      dxHtml += `
        <div class="dx-row">
          <div class="dx-left">
            <span class="num">${idx}.</span>
            <span>${escHtml(dx.text)}${icdHtml}${occHtml}${dxTagHtml}</span>
          </div>
          <div class="dx-right">
            <div class="dx-right-label">來源詳情（不複製）</div>
            ${srcList}
          </div>
        </div>
      `;
      idx++;
    });

    dxHtml += `</div>`;
  }
  dxArea.innerHTML = dxHtml;

  // Wire copy buttons (4 個：每邊 1 個全部 + 1 個僅現異常)
  const objBtn = $('copyObjBtn');
  if (objBtn) objBtn.addEventListener('click', () => copyObjective('all'));
  const objCurBtn = $('copyObjCurBtn');
  if (objCurBtn) objCurBtn.addEventListener('click', () => copyObjective('current'));
  const dxBtn = $('copyDxBtn');
  if (dxBtn) dxBtn.addEventListener('click', () => copyDiagnosis('all'));
  const dxCurBtn = $('copyDxCurBtn');
  if (dxCurBtn) dxCurBtn.addEventListener('click', () => copyDiagnosis('current'));
}

// 收合輸入區、顯示 summary
function collapseInputPanel(totalParsed) {
  const panel = $('inputPanel');
  if (!panel) return;
  panel.classList.add('collapsed');
  const icon = $('inputCollapseIcon');
  if (icon) icon.textContent = '▶';
  const summary = $('inputSummary');
  if (summary) {
    summary.textContent = `· 已解析 ${totalParsed} 項　[點此展開重編]`;
    summary.style.display = '';
  }
}

// 展開輸入區
function expandInputPanel() {
  const panel = $('inputPanel');
  if (!panel) return;
  panel.classList.remove('collapsed');
  const icon = $('inputCollapseIcon');
  if (icon) icon.textContent = '▼';
  const summary = $('inputSummary');
  if (summary) summary.style.display = 'none';
}

// 點 panel-title 切換展開／收合
function toggleInputPanel() {
  const panel = $('inputPanel');
  if (!panel) return;
  if (panel.classList.contains('collapsed')) {
    expandInputPanel();
  } else {
    // 已展開但有結果 → 收合
    if ($('resultGrid').style.display !== 'none') {
      const totalParsed = state.allResults.length;
      collapseInputPanel(totalParsed);
    }
  }
}

// 把 free-text 診斷格式化為 "Lipoma (2026/02 Pathology)" 樣式
function formatFreeTextDx(d) {
  const sortedSources = [...d.sources].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  // 過濾掉 pathology source（已合併進 text、不重複顯示）
  const tagSources = sortedSources.filter(s => !(s.short in PATHOLOGY_TO_PROCEDURE));
  // 取所有獨立 short（通常 1-2 個、例如 EGD、Colonoscopy）
  const uniqueShorts = [...new Set(tagSources.map(s => s.short))];
  const shortTag = uniqueShorts.join(', ');

  // 有 multiple occurrences（同 ICD 合併過）→ 「主診斷, YYYY/MM severity, YYYY/MM severity (short)」
  if (d.occurrences && d.occurrences.length > 1) {
    // 主診斷脫掉 severity 後綴（如「Reflux esophagitis, LA grade B」→「Reflux esophagitis」）
    const cleanName = stripSeverityFromText(d.text);
    const occParts = d.occurrences.map(o => {
      const dateStr = fmtYearMonth(o.date);
      return o.severity ? `${dateStr} ${o.severity}` : dateStr;
    });
    return `${cleanName}, ${occParts.join(', ')} (${shortTag})`;
  }

  // 單一來源 → 「Reflux esophagitis, LA grade B (2021/04 EGD)」
  const seen = new Set();
  const uniqueTagSources = tagSources.filter(s => {
    const k = `${fmtYearMonth(s.date)}|${s.short}`;
    if (seen.has(k)) return false;
    seen.add(k);
    return true;
  });
  const tag = uniqueTagSources.map(s => `${fmtYearMonth(s.date)} ${s.short}`).join(' / ');
  return `${d.text} (${tag})`;
}

// 從診斷文字中移除 severity 後綴（合併版複製時用、避免「Reflux esophagitis, LA grade B, 2021/04 grade A」）
// 注意：只移除可被 extractSeverity 抽到的明確 severity
function stripSeverityFromText(text) {
  return text
    .replace(/,\s*LA[\s\-]*grade\s+[A-D]\s*$/i, '')
    .replace(/,\s*LA[\-\s]+[A-D]\s*$/i, '')
    .replace(/,\s*grade\s+[A-D1-4IV]+\s*$/i, '')
    .replace(/,\s*(?:mild|moderate|severe)\s*$/i, '')
    .trim();
}

function copyObjective(mode) {
  // mode = 'all' (預設) 或 'current'（僅現異常：lab 過濾掉 flag=OK 的、即使有 pastAbnormal）
  const lines = [];
  const currentOnly = mode === 'current';

  // ── 1) 數值表 — 依「採檢日期 + 檢查類型」分組 ──
  if (state.integrated.length > 0) {
    // 「僅現異常」模式：只保留 flag = H/HH/L/LL 的（曾異常但目前 OK 的不要）
    const filteredItems = currentOnly
      ? state.integrated.filter(it => ['H', 'HH', 'L', 'LL'].includes(it.flag))
      : state.integrated;

    if (filteredItems.length > 0) {
      const labGroups = new Map();
      for (const item of filteredItems) {
        const dateKey = (item.sampledAt || '').slice(0, 10);
        const sourceGroup = labGroupName(item.sourceType);
        const key = `${dateKey}|${sourceGroup}`;
        if (!labGroups.has(key)) {
          labGroups.set(key, { date: dateKey, group: sourceGroup, items: [] });
        }
        labGroups.get(key).items.push(item);
      }
      // 排序：日期新→舊
      const sortedGroups = [...labGroups.values()].sort((a, b) => (b.date || '').localeCompare(a.date || ''));

      for (const grp of sortedGroups) {
        lines.push(`${fmtDate(grp.date)} ${grp.group}:`);
        for (const item of grp.items) {
          const value = displayValue(item);
          const unit = (item.def && item.def.unit) || '';
          const flag = (item.flag === 'H' || item.flag === 'HH') ? ' (H)'
                     : (item.flag === 'L' || item.flag === 'LL') ? ' (L)'
                     : '';
          let line = `  ${item.key}: ${value}${unit ? ' ' + unit : ''}${flag}`;
          // 「僅現異常」模式不顯示 past（焦點放當前異常）
          if (item.pastAbnormal && !currentOnly) {
            const pv = displayValue(item.pastAbnormal);
            line += ` (past: ${pv} ${fmtDate(item.pastAbnormal.sampledAt)})`;
          }
          lines.push(line);
        }
        lines.push('');  // 分組間空一行
      }
    }
  }

  // ── 2) Free-text 報告 — 依「日期 + 檢查」分組（用未合併版） ──
  // free-text 在「僅現異常」模式下仍全部保留（依使用者選項 A）
  if (state.freeTextDxRaw.length > 0) {
    const ftGroups = new Map();
    for (const d of state.freeTextDxRaw) {
      const sourcesSorted = [...d.sources].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      const primary = sourcesSorted[0];
      const dateKey = (primary.date || '').slice(0, 7);
      const shortKey = primary.short || 'Other';
      const key = `${dateKey}|${shortKey}`;
      if (!ftGroups.has(key)) {
        ftGroups.set(key, { date: dateKey, short: shortKey, items: [] });
      }
      ftGroups.get(key).items.push(d);
    }
    const sortedFtGroups = [...ftGroups.values()].sort((a, b) => (b.date || '').localeCompare(a.date || ''));

    for (const grp of sortedFtGroups) {
      lines.push(`${fmtYearMonth(grp.date)} ${grp.short}:`);
      for (const d of grp.items) {
        lines.push(`  ${d.text}`);
      }
      lines.push('');
    }
  }

  // 移除尾端多餘空行
  while (lines.length > 0 && lines[lines.length - 1] === '') lines.pop();

  navigator.clipboard.writeText(lines.join('\n'));
  showToast(currentOnly ? '已複製 Objective（僅現異常）' : '已複製 Objective');
}

function copyDiagnosis(mode) {
  // mode = 'all' (預設) 或 'current'（僅複製 lab rule 觸發的診斷+所有 free-text；不變、因為 lab rule 都是依現異常生成）
  // 實際上 state.dx 是 applyDiagnosisRules(state.integrated) 結果、本身就只反映「現異常」的 lab rule
  // 「僅現異常」模式：lab-rule dx 不變、free-text 全保留
  // （依使用者選擇 A，free-text 不過濾）
  const lines = [];
  let idx = 1;
  state.dx.forEach(d => { lines.push(`${idx}. ${d.rule.name}`); idx++; });
  state.freeTextDx.forEach(d => {
    lines.push(`${idx}. ${formatFreeTextDx(d)}`);
    idx++;
  });
  navigator.clipboard.writeText(lines.join('\n'));
  const label = mode === 'current' ? '已複製 Diagnosis（僅現異常）' : '已複製 Diagnosis';
  showToast(`${label}（${lines.length} 條）`);
}

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ─── Wire up ───────────────────────────────────────────────────
$('parseBtn').addEventListener('click', runParse);
$('clearBtn').addEventListener('click', () => {
  $('labInput').value = '';
  state.demographics = { name: null, chartNo: null, sex: null, age: null, birthDate: null };
  state.integrated = []; state.skipped = []; state.dx = []; state.unknown = []; state.freeTextDx = []; state.freeTextDxRaw = [];
  $('resultMeta').style.display = 'none';
  $('resultGrid').style.display = 'none';
  $('warningBanner').style.display = 'none';
  $('emptyState').style.display = '';
  $('emptyState').innerHTML = `<div class="big">🧪</div>貼上檢驗結果後按「解析」`;
  // 展開輸入區
  expandInputPanel();
});

// 點輸入區標題切換展開／收合
const inputTitle = $('inputPanelTitle');
if (inputTitle) inputTitle.addEventListener('click', toggleInputPanel);

$('labInput').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault(); runParse();
  }
});

// Inject tab icons if shared icons.js loaded
if (typeof ICON !== 'undefined') {
  document.querySelectorAll('.tab-link .ti').forEach(el => {
    const k = el.dataset.icon;
    if (ICON[k]) el.innerHTML = ICON[k];
  });
}
