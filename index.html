<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健保藥品給付規定查詢</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/7.0.0/fuse.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0f1117;
    --bg2: #161b27;
    --surface: #1c2333;
    --surface2: #222c3d;
    --border: #2d3a52;
    --border-strong: #3d4f6e;
    --text: #e2e8f4;
    --text-muted: #8fa3c0;
    --text-light: #566880;
    --accent: #4a9eff;
    --accent-dim: #1e3a5f;
    --accent-glow: rgba(74,158,255,0.15);
    --highlight: rgba(255,210,60,0.18);
    --highlight-border: rgba(255,210,60,0.6);
    --green: #4ade80;
    --green-bg: rgba(74,222,128,0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 16px;
    line-height: 1.7;
  }

  /* ── Tab bar：唯一 sticky 元素，固定在最頂端 ── */
  .tabs-bar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    padding: 0 20px;
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .tabs-bar::-webkit-scrollbar { display: none; }
  .tab-link {
    display: block;
    border-bottom: 2px solid transparent;
    color: var(--text-muted);
    font-size: 14px;
    padding: 11px 18px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    text-decoration: none;
  }
  .tab-link:hover { color: var(--text); }
  .tab-link.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ── 搜尋 header（非 sticky，普通區塊） ── */
  .search-header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
  }
  .search-header-inner {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo {
    width: 38px; height: 38px;
    background: var(--accent-dim);
    border: 1px solid rgba(74,158,255,0.3);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .site-title { font-size: 17px; font-weight: 700; letter-spacing: 0.03em; }
  .site-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .search-wrap { position: relative; flex: 1; }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
  #searchInput {
    width: 100%; padding: 11px 44px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 15px; font-family: inherit;
    background: var(--surface); color: var(--text); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #searchInput::placeholder { color: var(--text-light); }
  #searchInput:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .clear-btn {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: var(--surface2); border: 1px solid var(--border); border-radius: 50%;
    width: 22px; height: 22px; cursor: pointer; color: var(--text-muted); font-size: 12px;
    display: none; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .clear-btn:hover { background: var(--border-strong); color: var(--text); }
  .clear-btn.visible { display: flex; }

  /* ── Main content ── */
  main { max-width: 860px; margin: 0 auto; padding: 18px 20px 60px; }

  .status-bar { display: flex; align-items: center; margin-bottom: 14px; }
  .result-count { font-size: 14px; color: var(--text-muted); }
  .result-count strong { color: var(--accent); }

  .tips-section { margin-bottom: 20px; }
  .tips-label { font-size: 13px; color: var(--text-light); margin-bottom: 8px; }
  .tips-wrap { display: flex; flex-wrap: wrap; gap: 7px; }
  .tip-chip {
    padding: 5px 13px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 20px;
    font-size: 14px; color: var(--text-muted); cursor: pointer;
    transition: all 0.15s; font-family: 'JetBrains Mono', monospace;
  }
  .tip-chip:hover { background: var(--accent-dim); color: var(--accent); border-color: rgba(74,158,255,0.4); }

  #results { display: flex; flex-direction: column; gap: 8px; }

  .drug-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; transition: border-color 0.2s;
  }
  .drug-card:hover { border-color: var(--border-strong); }
  .drug-card.expanded { border-color: rgba(74,158,255,0.4); box-shadow: 0 0 0 1px rgba(74,158,255,0.08); }

  .card-header {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 13px 16px; cursor: pointer; user-select: none; transition: background 0.15s;
  }
  .card-header:hover { background: var(--surface2); }

  .section-badge {
    flex-shrink: 0; font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600;
    background: var(--accent-dim); color: var(--accent);
    border: 1px solid rgba(74,158,255,0.25); border-radius: 5px;
    padding: 3px 7px; margin-top: 2px; white-space: nowrap;
  }

  .card-title-wrap { flex: 1; min-width: 0; }
  .card-title { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.45; word-break: break-word; }
  .card-title mark { background: var(--highlight); color: var(--accent); border-radius: 3px; padding: 0 2px; }
  .card-preview { font-size: 13px; color: var(--text-muted); margin-top: 4px; line-height: 1.5; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

  .expand-icon { flex-shrink: 0; color: var(--text-light); font-size: 12px; transition: transform 0.2s; margin-top: 4px; }
  .drug-card.expanded .expand-icon { transform: rotate(180deg); }

  .card-body { display: none; border-top: 1px solid var(--border); padding: 0 16px 16px; }
  .drug-card.expanded .card-body { display: block; }

  .content-text { font-size: 14px; line-height: 1.85; color: var(--text); white-space: pre-wrap; word-break: break-word; padding-top: 14px; }
  .content-text mark { background: var(--highlight); border-bottom: 2px solid var(--highlight-border); border-radius: 2px; color: #ffd23c; padding: 0 1px; }

  .copy-btn {
    display: inline-flex; align-items: center; gap: 6px; margin-top: 14px;
    padding: 7px 14px; background: var(--surface2); color: var(--text-muted);
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 13px; font-family: inherit; cursor: pointer; transition: all 0.15s;
  }
  .copy-btn:hover { background: var(--accent-dim); color: var(--accent); border-color: rgba(74,158,255,0.4); }
  .copy-btn.copied { background: var(--green-bg); color: var(--green); border-color: rgba(74,222,128,0.3); }

  .state-msg { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .state-msg .icon { font-size: 44px; margin-bottom: 16px; }
  .state-msg h3 { font-size: 16px; margin-bottom: 8px; color: var(--text); }
  .state-msg p { font-size: 14px; }

  .no-results { text-align: center; padding: 40px 20px; color: var(--text-muted); }
  .no-results .icon { font-size: 36px; margin-bottom: 10px; }

  footer {
    text-align: center; padding: 20px;
    font-size: 13px; color: var(--text-light);
    border-top: 1px solid var(--border); background: var(--bg2);
  }
  footer a { color: var(--accent); text-decoration: none; }
  .footer-meta {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 20px;
    margin-bottom: 10px; font-size: 12px; color: var(--text-muted);
  }
</style>
</head>
<body>

<!-- Tab bar：唯一 sticky，固定在頂端 -->
<nav class="tabs-bar">
  <a class="tab-link active" href="index.html">🔍 藥品給付查詢</a>
  <a class="tab-link" href="lipid.html">📊 高血脂風險評估</a>
</nav>

<!-- 搜尋區（不 sticky，隨頁面滾動） -->
<div class="search-header">
  <div class="search-header-inner">
    <div class="logo">💊</div>
    <div style="flex:1">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <div>
          <div class="site-title">健保藥品給付規定查詢</div>
          <div class="site-sub">全民健康保險藥品給付規定 · 快速全文搜尋</div>
        </div>
      </div>
      <div class="search-wrap" style="margin-top:12px;">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput"
          placeholder="輸入藥名、成分、適應症…（如 Pregabalin、SGLT2、PPI、prazole）"
          autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="clear-btn" id="clearBtn">✕</button>
      </div>
    </div>
  </div>
</div>

<main>
  <div class="status-bar">
    <div class="result-count" id="resultCount"></div>
  </div>
  <div class="tips-section" id="tipsSection">
    <div class="tips-label">常見搜尋</div>
    <div class="tips-wrap" id="tipChips"></div>
  </div>
  <div id="results"></div>
</main>

<footer>
  <div class="footer-meta">
    <span><span style="color:var(--text-light)">健保署資料日期：</span><span id="nhiVersion" style="font-family:'JetBrains Mono',monospace;">—</span></span>
    <span><span style="color:var(--text-light)">本站最近更新：</span><span id="lastUpdate" style="font-family:'JetBrains Mono',monospace;">—</span></span>
    <span><span style="color:var(--text-light)">自動更新頻率：</span><span style="font-family:'JetBrains Mono',monospace;">每週一 10:00</span></span>
  </div>
  資料來源：<a href="https://www.nhi.gov.tw/ch/cp-13108-67ddf-2508-1.html" target="_blank">衛生福利部中央健康保險署</a> ·
  本站僅供查詢參考，以健保署官方公告為準
</footer>

<script>
let allDrugs = [];
let fuse;
let currentQuery = '';

const ALIAS_MAP = {
  'ppi':            ['omeprazole','esomeprazole','pantoprazole','lansoprazole','rabeprazole','氫離子幫浦','消化性潰瘍','proton pump'],
  'prazole':        ['omeprazole','esomeprazole','pantoprazole','lansoprazole','rabeprazole','氫離子幫浦','消化性潰瘍'],
  'proton pump':    ['omeprazole','esomeprazole','pantoprazole','氫離子幫浦','消化性潰瘍'],
  '氫離子幫浦':      ['ppi','消化性潰瘍','omeprazole','esomeprazole'],
  '消化性潰瘍':      ['ppi','氫離子幫浦'],
  'sglt2':          ['empagliflozin','dapagliflozin','canagliflozin','sglt-2','jardiance','forxiga'],
  'sglt-2':         ['empagliflozin','dapagliflozin','canagliflozin'],
  'empagliflozin':  ['sglt-2','sglt2'],
  'dapagliflozin':  ['sglt-2','sglt2'],
  'canagliflozin':  ['sglt-2','sglt2'],
  'dpp4':           ['sitagliptin','vildagliptin','saxagliptin','linagliptin','alogliptin','dpp-4'],
  'dpp-4':          ['sitagliptin','vildagliptin','saxagliptin','linagliptin'],
  'sitagliptin':    ['dpp-4','dpp4'],
  'glp1':           ['exenatide','liraglutide','dulaglutide','semaglutide','glp-1'],
  'glp-1':          ['exenatide','liraglutide','dulaglutide','semaglutide'],
  'semaglutide':    ['glp-1','glp1','ozempic'],
  'liraglutide':    ['glp-1','glp1'],
  'insulin':        ['胰島素','降血糖'],
  '胰島素':          ['insulin'],
  '生物製劑':        ['adalimumab','infliximab','etanercept','tocilizumab','biologics'],
  'tnf':            ['adalimumab','infliximab','etanercept','certolizumab'],
  '類風濕':          ['methotrexate','adalimumab','infliximab','etanercept','tocilizumab'],
};

const TIPS = [
  'Pregabalin','Tramadol','PPI','SGLT2','類風濕','糖尿病',
  'Adalimumab','干擾素','Gabapentin','GLP-1','生物製劑','semaglutide'
];

async function loadData() {
  try {
    const res = await fetch('data/drugs.json');
    allDrugs = await res.json();

    fuse = new Fuse(allDrugs, {
      keys: [
        { name: 'title',      weight: 0.45 },
        { name: 'drug_names', weight: 0.35 },
        { name: 'content',    weight: 0.2  }
      ],
      threshold: 0.38,
      includeScore: true,
      minMatchCharLength: 2,
      ignoreLocation: true
    });

    try {
      const vr = await fetch('data/last_version.txt');
      const ver = (await vr.text()).trim();
      const rocY = ver.slice(0,3), m = ver.slice(3,5), d = ver.slice(5,7);
      const label = `民國${rocY}年${m}月${d}日`;
      document.getElementById('nhiVersion').textContent = label;
      document.getElementById('lastUpdate').textContent = label;
    } catch(e) {}

    showWelcome();
  } catch(e) {
    document.getElementById('results').innerHTML =
      `<div class="state-msg"><div class="icon">⚠️</div><h3>載入失敗</h3><p>${e.message}</p></div>`;
  }
}

function showWelcome() {
  document.getElementById('resultCount').innerHTML =
    `共收錄 <strong>${allDrugs.length}</strong> 個給付條目`;
  document.getElementById('tipChips').innerHTML =
    TIPS.map(t => `<span class="tip-chip" onclick="doTip('${t}')">${t}</span>`).join('');
  document.getElementById('tipsSection').style.display = '';
  document.getElementById('results').innerHTML =
    `<div class="state-msg">
      <div class="icon">🔍</div>
      <h3>輸入藥名或關鍵字開始查詢</h3>
      <p>支援中文、英文學名、商品名、適應症、藥物類別（如 SGLT2、PPI、prazole）</p>
    </div>`;
}

function doTip(w) {
  document.getElementById('searchInput').value = w;
  doSearch(w);
}

function getSearchTerms(q) {
  const lower = q.toLowerCase().trim();
  const terms = new Set([lower]);
  for (const [key, aliases] of Object.entries(ALIAS_MAP)) {
    if (lower.includes(key) || key.includes(lower)) {
      aliases.forEach(a => terms.add(a.toLowerCase()));
    }
  }
  return [...terms];
}

function doSearch(q) {
  currentQuery = q.trim();
  document.getElementById('clearBtn').classList.toggle('visible', currentQuery.length > 0);
  if (!currentQuery) { showWelcome(); return; }
  document.getElementById('tipsSection').style.display = 'none';

  const terms = getSearchTerms(currentQuery);
  const exactIds = new Set();
  allDrugs.forEach(d => {
    const hay = (d.title + ' ' + d.content + ' ' + (d.drug_names||[]).join(' ')).toLowerCase();
    if (terms.some(t => hay.includes(t))) exactIds.add(d.id);
  });

  const fuzzy = fuse.search(currentQuery);
  const seen = new Set();
  const merged = [];
  allDrugs.forEach(d => { if (exactIds.has(d.id)) { merged.push(d); seen.add(d.id); } });
  fuzzy.forEach(r => { if (!seen.has(r.item.id)) { merged.push(r.item); seen.add(r.item.id); } });

  document.getElementById('resultCount').innerHTML =
    `搜尋「<strong>${esc(currentQuery)}</strong>」，找到 <strong>${merged.length}</strong> 筆`;

  if (!merged.length) {
    document.getElementById('results').innerHTML =
      `<div class="no-results"><div class="icon">🤷</div>
      <p>找不到「${esc(currentQuery)}」的相關給付規定</p>
      <p style="margin-top:8px;font-size:13px;color:var(--text-light)">試試換個關鍵字，或用英文學名搜尋</p></div>`;
    return;
  }

  document.getElementById('results').innerHTML = merged.slice(0,100).map(renderCard).join('');
  document.querySelectorAll('.card-header').forEach(h =>
    h.addEventListener('click', () => h.closest('.drug-card').classList.toggle('expanded'))
  );
  document.querySelectorAll('.copy-btn').forEach(btn =>
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const drug = allDrugs.find(d => d.id == btn.dataset.id);
      if (!drug) return;
      navigator.clipboard.writeText(drug.title + '\n\n' + drug.content).then(() => {
        btn.textContent = '✓ 已複製'; btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '📋 複製條文'; btn.classList.remove('copied'); }, 2000);
      });
    })
  );
}

function renderCard(drug) {
  const sec = drug.title.match(/^[\d.]+/)?.[0]?.replace(/\.$/, '') || '';
  const preview = drug.content.slice(0, 130).replace(/\n/g,' ') + '…';
  return `
  <div class="drug-card">
    <div class="card-header">
      ${sec ? `<span class="section-badge">${esc(sec)}</span>` : ''}
      <div class="card-title-wrap">
        <div class="card-title">${hlText(esc(drug.title))}</div>
        <div class="card-preview">${esc(preview)}</div>
      </div>
      <span class="expand-icon">▼</span>
    </div>
    <div class="card-body">
      <div class="content-text">${hlText(esc(drug.content))}</div>
      <button class="copy-btn" data-id="${drug.id}">📋 複製條文</button>
    </div>
  </div>`;
}

function hlText(html) {
  if (!currentQuery) return html;
  const terms = getSearchTerms(currentQuery).sort((a,b) => b.length - a.length);
  let out = html;
  for (const t of terms) {
    if (t.length < 2) continue;
    try { out = out.replace(new RegExp(`(${t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>'); } catch{}
  }
  return out;
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let timer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(timer); timer = setTimeout(() => doSearch(e.target.value), 180);
});
document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('searchInput').value = ''; showWelcome();
});
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== document.getElementById('searchInput')) {
    e.preventDefault(); document.getElementById('searchInput').focus();
  }
  if (e.key === 'Escape') document.getElementById('searchInput').blur();
});

loadData();
</script>
</body>
</html>
