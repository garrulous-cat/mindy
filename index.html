const TIPS = [
  'Pregabalin','Tramadol','PPI','SGLT2','類風濕','糖尿病',
  'Adalimumab','干擾素','Gabapentin','GLP-1','生物製劑','semaglutide'

async function loadData() {
  try {
    const res = await fetch('data/drugs.json');
    allDrugs = await res.json();

    // Build fuse index on non-appendix entries only
    const searchableForFuse = allDrugs.filter(d => !d.is_appendix);
    fuse = new Fuse(searchableForFuse, {
      keys: [
        { name: 'title',      weight: 0.5  },
        { name: 'drug_names', weight: 0.4  },
        { name: 'content',    weight: 0.1  }
      ],
      threshold: 0.25,
      includeScore: true,
      minMatchCharLength: 3,
      ignoreLocation: true
    });

    try {
      const vr = await fetch('data/last_version.txt');
      const ver = (await vr.text()).trim();
      const rocY = ver.slice(0,3), m = ver.slice(3,5), d = ver.slice(5,7);
      const label = `民國${rocY}年${m}月${d}日`;
      document.getElementById('nhiVersion').textContent = label;
      document.getElementById('lastUpdate').textContent = label;
    } catch(e) {}

    // 載入 changelog（若存在）
    try {
      const cr = await fetch('data/changelog.json');
      if (cr.ok) {
        const cl = await cr.json();
        renderChangelog(cl);
      }
    } catch(e) { /* changelog 是 optional */ }

    // 若 URL 帶 ?q= 參數（例如從 lipid.html 跳過來），自動執行搜尋
    const urlParams = new URLSearchParams(window.location.search);
    const initialQuery = urlParams.get('q');
    if (initialQuery) {
      const searchEl = document.getElementById('searchInput');
      searchEl.value = initialQuery;
      doSearch(initialQuery);
      // 清掉 query string（避免重整跑兩次）
      if (window.history && window.history.replaceState) {
        window.history.replaceState(null, '', window.location.pathname);
      }
    } else {
      showWelcome();
    }
  } catch(e) {
    document.getElementById('results').innerHTML =
      `<div class="state-msg"><div class="icon">⚠️</div><h3>載入失敗</h3><p>${e.message}</p></div>`;
  }
}

// ── Changelog banner ──────────────────────────────
function renderChangelog(cl) {
  if (!cl || (!cl.added?.length && !cl.modified?.length && !cl.removed?.length)) return;
  const banner = document.getElementById('changelogBanner');
  const a = (cl.added || []).length;
  const m = (cl.modified || []).length;
  const r = (cl.removed || []).length;

  // 格式化版本日期
  let verLabel = '';
  if (cl.from_version && cl.to_version) {
    const fmt = v => `${v.slice(0,3)}/${v.slice(3,5)}/${v.slice(5,7)}`;
    verLabel = `（${fmt(cl.from_version)} → ${fmt(cl.to_version)}）`;
  } else if (cl.to_version) {
    const v = cl.to_version;
    verLabel = `（${v.slice(0,3)}/${v.slice(3,5)}/${v.slice(5,7)}）`;
  }

  const stats = [];
  if (a) stats.push(`新增 <span class="cl-stat cl-add">${a}</span> 條`);
  if (m) stats.push(`修改 <span class="cl-stat cl-mod">${m}</span> 條`);
  if (r) stats.push(`刪除 <span class="cl-stat cl-del">${r}</span> 條`);

  const groupHtml = (label, items, cls) => {
    if (!items?.length) return '';
    const lis = items.slice(0, 30).map(t => `<li>${esc(t)}</li>`).join('');
    const more = items.length > 30 ? `<li style="color:#566880">… 還有 ${items.length - 30} 條</li>` : '';
    return `<div class="cl-group">
      <div class="cl-group-title" style="color:${cls === 'add' ? '#3fb950' : cls === 'mod' ? '#d29922' : '#f85149'}">
        ${label}
      </div>
      <ul>${lis}${more}</ul>
    </div>`;
  };

  banner.innerHTML = `
    <div class="changelog-banner" id="clBanner">
      <span class="cl-icon">${ICON.changelog}</span>
      <div class="cl-body">
        <div class="cl-title">本次更新${verLabel}</div>
        <div>${stats.join(' · ') || '無條目變動'}</div>
        <div class="cl-detail">
          ${groupHtml('NEW · 新增', cl.added, 'add')}
          ${groupHtml('MOD · 修改', cl.modified, 'mod')}
          ${groupHtml('DEL · 刪除', cl.removed, 'del')}
        </div>
      </div>
      ${(a + m + r) > 0 ? `<button class="cl-toggle" id="clToggle">展開明細</button>` : ''}
    </div>
  `;
  const tog = document.getElementById('clToggle');
  if (tog) {
    tog.addEventListener('click', () => {
      const b = document.getElementById('clBanner');
      const open = b.classList.toggle('open');
      tog.firstChild.nodeValue = open ? '收合明細' : '展開明細';
    });
  }
}

function showWelcome() {
  document.getElementById('resultCount').innerHTML =
    `共收錄 <strong>${allDrugs.length}</strong> 個給付條目`;
  document.getElementById('tipChips').innerHTML =
    TIPS.map(t => `<span class="tip-chip" onclick="doTip('${t}')">${t}</span>`).join('');
  document.getElementById('tipsSection').style.display = '';
  document.getElementById('results').innerHTML =
    `<div class="state-msg">
      <div class="icon">🔍</div>
      <h3>輸入藥名或關鍵字開始查詢</h3>
      <p>支援中文、英文學名、商品名、適應症、藥物類別（如 SGLT2、PPI、prazole）</p>
    </div>`;
}

function doTip(w) {
  document.getElementById('searchInput').value = w;
  doSearch(w);
}

function getSearchTerms(q) {
  const lower = q.toLowerCase().trim();
  const terms = new Set([lower]);
  for (const [key, aliases] of Object.entries(ALIAS_MAP)) {
    // Only expand if: exact match, or query contains key as whole word, or key === query prefix (≥4 chars)
    const exactMatch = lower === key;
    const queryContainsKey = lower.includes(key) && key.length >= 4;
    const keyStartsWithQuery = key.startsWith(lower) && lower.length >= 4;
    if (exactMatch || queryContainsKey || keyStartsWithQuery) {
      aliases.forEach(a => terms.add(a.toLowerCase()));
    }
  }
  return [...terms];
}

function doSearch(q) {
  currentQuery = q.trim();
  document.getElementById('clearBtn').classList.toggle('visible', currentQuery.length > 0);
  if (!currentQuery) { showWelcome(); return; }
  document.getElementById('tipsSection').style.display = 'none';

  const terms = getSearchTerms(currentQuery);
  const exactIds = new Set();

  // For short queries (≤3 chars): prefix match only in title
  // For longer queries: word-boundary aware match to avoid substring false positives
  // e.g. "statin" should not match "Sandostatin" or "cilastatin"
  function termMatches(term, hay, title) {
    if (term.length <= 2) return hay.includes(term);
    // Word-boundary check: term must be preceded/followed by non-alphanumeric or start/end
    const re = new RegExp('(?<![a-z0-9])' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '(?![a-z0-9])', 'i');
    return re.test(hay);
  }

  allDrugs.forEach(d => {
    if (d.is_appendix) return;
    const hay = (d.title + ' ' + d.content + ' ' + (d.drug_names||[]).join(' ')).toLowerCase();
    if (terms.some(t => termMatches(t, hay, d.title))) exactIds.add(d.id);
  });

  // Fuzzy search on non-appendix only
  const searchable = allDrugs.filter(d => !d.is_appendix);
  const fuzzy = fuse.search(currentQuery);
  const seen = new Set();
  const merged = [];
  allDrugs.forEach(d => { if (exactIds.has(d.id)) { merged.push(d); seen.add(d.id); } });
  fuzzy.forEach(r => { if (!seen.has(r.item.id) && !r.item.is_appendix) { merged.push(r.item); seen.add(r.item.id); } });

  document.getElementById('resultCount').innerHTML =
    `搜尋「<strong>${esc(currentQuery)}</strong>」，找到 <strong>${merged.length}</strong> 筆`;

  if (!merged.length) {
    document.getElementById('results').innerHTML =
      `<div class="no-results"><div class="icon">🤷</div>
      <p>找不到「${esc(currentQuery)}」的相關給付規定</p>
      <p style="margin-top:8px;font-size:13px;color:var(--text-light)">試試換個關鍵字，或用英文學名搜尋</p></div>`;
    return;
  }

  document.getElementById('results').innerHTML = merged.slice(0,100).map(renderCard).join('');
  bindCardEvents();
}

function bindCardEvents() {
  document.querySelectorAll('.card-header').forEach(h =>
    h.addEventListener('click', () => h.closest('.drug-card').classList.toggle('expanded'))
  );
  document.querySelectorAll('.copy-btn').forEach(btn =>
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const drug = allDrugs.find(d => d.id == btn.dataset.id);
      if (!drug) return;
      navigator.clipboard.writeText(drug.title + '\n\n' + drug.content).then(() => {
        btn.innerHTML = ICON.check + '<span>已複製</span>';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerHTML = ICON.copy + '<span>複製條文</span>';
          btn.classList.remove('copied');
        }, 2000);
      });
    })
  );
  // 相關條目點擊：捲動到對應的卡片並展開
  document.querySelectorAll('.related-item').forEach(item =>
    item.addEventListener('click', e => {
      e.stopPropagation();
      const id = item.dataset.jumpId;
      jumpToDrug(id);
    })
  );
}

function jumpToDrug(id) {
  const drug = allDrugs.find(d => d.id == id);
  if (!drug) return;

  // 若目標卡片已在當前結果中，捲動 + 展開
  const cards = document.querySelectorAll('.drug-card');
  let foundCard = null;
  cards.forEach(c => {
    const btn = c.querySelector('.copy-btn');
    if (btn && btn.dataset.id == id) foundCard = c;
  });

  if (foundCard) {
    foundCard.classList.add('expanded');
    foundCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
    foundCard.style.transition = 'box-shadow 0.3s';
    foundCard.style.boxShadow = '0 0 0 2px rgba(74,158,255,0.5)';
    setTimeout(() => { foundCard.style.boxShadow = ''; }, 1500);
  } else {
    // 不在結果中：用標題作為新搜尋
    const titleNoNum = drug.title.replace(/^[\d.]+\.?\s*/, '').slice(0, 20);
    document.getElementById('searchInput').value = titleNoNum;
    doSearch(titleNoNum);
    // 等 render 完再跳一次
    setTimeout(() => jumpToDrug(id), 200);
  }
}

function renderCard(drug) {
  const sec = drug.title.match(/^[\d.]+/)?.[0]?.replace(/\.$/, '') || '';
  const preview = (drug.content || '').slice(0, 130).replace(/\n/g,' ') + '…';
  const is26 = sec && sec.startsWith('2.6');
  const bodyHtml = is26 ? render26Table(drug) : renderBlocks(drug);
  const relatedHtml = renderRelated(drug);

  return [
    '<div class="drug-card">',
    '  <div class="card-header">',
    sec ? '<span class="section-badge">' + esc(sec) + '</span>' : '',
    '  <div class="card-title-wrap">',
    '    <div class="card-title">' + hlText(esc(drug.title)) + '</div>',
    '    <div class="card-preview">' + esc(preview) + '</div>',
    '  </div>',
    '  <span class="expand-icon">▼</span>',
    '</div>',
    '<div class="card-body">',
    bodyHtml,
    '<button class="copy-btn" data-id="' + drug.id + '">' + ICON.copy + '<span>複製條文</span></button>',
    relatedHtml,
    '</div>',
    '</div>'
  ].join('');
}

// ── 相關條目：透過 ALIAS_MAP 找出同類藥的其他給付條目 ────
function findRelated(drug) {
  if (!drug || drug.is_appendix) return [];
  // 從 drug 的 title + drug_names 抽出可能的「藥類關鍵字」
  const hay = (drug.title + ' ' + (drug.drug_names || []).join(' ')).toLowerCase();
  const candidateTerms = new Set();

  // 對每個 ALIAS_MAP 的 entry，看 drug 是否屬於該類
  for (const [key, aliases] of Object.entries(ALIAS_MAP)) {
    // drug 命中此 key 或任一 alias，就把整組 alias + key 當候選詞
    const all = [key, ...aliases];
    const hit = all.some(t => {
      const tt = t.toLowerCase();
      if (tt.length < 3) return false;
      return hay.includes(tt);
    });
    if (hit) {
      all.forEach(t => candidateTerms.add(t.toLowerCase()));
    }
  }
  if (candidateTerms.size === 0) return [];

  // 在所有 drug 裡找：title/drug_names 命中候選詞、且不是自己、且非附表
  const related = [];
  const seen = new Set([drug.id]);
  for (const d of allDrugs) {
    if (seen.has(d.id) || d.is_appendix) continue;
    const dHay = (d.title + ' ' + (d.drug_names || []).join(' ')).toLowerCase();
    let matched = false;
    for (const t of candidateTerms) {
      if (t.length < 3) continue;
      // word-boundary check 避免 statin 誤中 sandostatin
      const re = new RegExp('(?<![a-z0-9])' + t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '(?![a-z0-9])', 'i');
      if (re.test(dHay)) { matched = true; break; }
    }
    if (matched) {
      related.push(d);
      seen.add(d.id);
    }
    if (related.length >= 8) break;
  }
  return related;
}

function renderRelated(drug) {
  const related = findRelated(drug);
  if (related.length === 0) return '';
  const items = related.map(d => {
    const sec = d.title.match(/^[\d.]+/)?.[0]?.replace(/\.$/, '') || '';
    return `<a class="related-item" data-jump-id="${d.id}">
      ${sec ? `<span class="related-badge">${esc(sec)}</span>` : ''}
      <span class="related-title-text">${esc(d.title.replace(/^[\d.]+\.?\s*/, ''))}</span>
    </a>`;
  }).join('');
  return `
    <div class="related-section">
      <div class="related-title">${ICON.link}<span>相關條目</span></div>
      <div class="related-list">${items}</div>
    </div>
  `;
}

function renderBlocks(drug) {
  if (drug.is_appendix) {
    return '<div class="appendix-notice">📋 本項含複雜附表，請至 <a href="https://www.nhi.gov.tw/ch/np-2505-1.html" target="_blank" style="color:var(--accent)">健保署官方網站</a>查閱完整規定。請注意本條目正文說明仍具參考價值。</div>';
  }
  if (!drug.blocks || drug.blocks.length === 0) {
    return '<div class="content-text">' + hlText(esc(drug.content || '')) + '</div>';
  }
  return drug.blocks.map(function(b) {
    var indent = b.level * 16;
    // Split sub-items within a block for better readability
    // Break on patterns like (1) (2) I. II. that appear mid-text
    var text = b.text;
    var html = hlText(esc(text));
    // Insert line breaks before numbered sub-items within a block
    // After sentence endings (。：者。者：者，) before list markers
    // Before (1) (2) etc
    html = html.replace(/([。：）])\s*([（(]\d+[）)])/g, '$1<br>$2');
    // Before 1. 2. etc
    html = html.replace(/([。：）者])\s*(\d+\.[　 ])/g, '$1<br>$2');
    // Also break when "。 2." appears without space issues
    html = html.replace(/([。])\s*(\d+\.)/g, '$1<br>$2');
    // Before I. II. Roman numerals
    html = html.replace(/([。：）])\s*([IⅠ][IⅠ]?[IⅠ]?\.[　 ])/g, '$1<br>$2');
    // Before i. ii. lowercase
    html = html.replace(/([。：）])\s*([ivx]+\.[　 ])/g, '$1<br>$2');
    return '<div class="content-block block-l' + b.level + '" style="padding-left:' + indent + 'px">' + html + '</div>';
  }).join('');
}

      '<table class="nhi-table"><thead><tr>',
      '<th>病人族群</th><th>非藥物治療</th><th>起始條件</th><th>目標值</th>',

      '<tr><td>無心血管疾病病人</td><td>給藥前 3–6 個月非藥物治療</td><td>TG ≥200 mg/dL 且（TC/HDL-C &gt;5 或 HDL-C &lt;40 mg/dL）</td><td>TG &lt;200 mg/dL</td></tr>',
      '<tr class="tr-highlight"><td>無心血管疾病病人（嚴重）</td><td>與藥物治療可並行</td><td>TG ≥500 mg/dL</td><td>TG &lt;500 mg/dL</td></tr>',

function hlText(html) {
  if (!currentQuery) return html;
  const terms = getSearchTerms(currentQuery).sort((a,b) => b.length - a.length);
  let out = html;
  for (const t of terms) {
    if (t.length < 2) continue;
    try { out = out.replace(new RegExp(`(${t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>'); } catch{}
  }
  return out;
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let timer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(timer); timer = setTimeout(() => doSearch(e.target.value), 180);
});
document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('searchInput').value = ''; showWelcome();
});
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== document.getElementById('searchInput')) {
    e.preventDefault(); document.getElementById('searchInput').focus();
  }
  if (e.key === 'Escape') document.getElementById('searchInput').blur();
});

}
