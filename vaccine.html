<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>疫苗查詢 · DR. YANG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --bg2: #161b27;
  --surface: #1c2333;
  --surface2: #212840;
  --border: #2d3a52;
  --border-strong: #3d4f6e;
  --text: #e2e8f4;
  --text-muted: #8fa3c0;
  --text-light: #566880;
  --accent: #4a9eff;
  --accent-dim: #1e3a5f;
  --accent-glow: rgba(74,158,255,0.15);
  --green: #3fb950;
  --green-dim: rgba(63,185,80,0.12);
  --green-border: rgba(63,185,80,0.35);
  --orange: #f0883e;
  --orange-dim: rgba(240,136,62,0.12);
  --orange-border: rgba(240,136,62,0.35);
  --red: #f85149;
  --yellow: #d4a843;
  --purple: #a371f7;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }

/* Tab bar */
.tabs-bar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; align-items: stretch; overflow-x: auto;
  position: sticky; top: 0; z-index: 100;
}
.tabs-bar::-webkit-scrollbar { display: none; }
.tab-link {
  padding: 14px 20px; white-space: nowrap; text-decoration: none;
  color: var(--text-muted); font-size: 14px; font-weight: 500;
  border-bottom: 2px solid transparent; transition: color 0.15s;
}
.tab-link:hover { color: var(--text); }
.tab-link.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Layout */
.page-wrap { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
.page-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.page-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }

/* Mode tabs */
.mode-tabs { display: flex; gap: 8px; margin-bottom: 28px; }
.mode-btn {
  padding: 8px 20px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text-muted); font-size: 14px;
  font-weight: 500; cursor: pointer; transition: all 0.15s; font-family: inherit;
}
.mode-btn:hover { border-color: var(--border-strong); color: var(--text); }
.mode-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

/* ─── Pediatric section ─── */
#peds-section { }

.dob-row {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  margin-bottom: 28px;
}
.dob-label { font-size: 14px; color: var(--text-muted); white-space: nowrap; }
.dob-input {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 15px; padding: 9px 14px; font-family: inherit;
  transition: border-color 0.15s;
}
.dob-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.age-display {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 16px; font-size: 14px; color: var(--accent);
  font-family: 'IBM Plex Mono', monospace; font-weight: 600;
}

/* Legend */
.legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
.legend-item { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--text-muted); }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; }
.legend-dot.pub { background: var(--green); }
.legend-dot.priv { background: var(--orange); }
.legend-dot.due { background: var(--accent); }
.legend-dot.done { background: var(--border-strong); }
.legend-dot.future { background: var(--surface2); border: 1px solid var(--border); }

/* Timeline */
.timeline-wrap { overflow-x: auto; padding-bottom: 12px; }
.timeline-table {
  width: 100%; min-width: 900px; border-collapse: separate; border-spacing: 0;
  border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
}
.timeline-table th, .timeline-table td {
  padding: 0; border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.timeline-table th:last-child, .timeline-table td:last-child { border-right: none; }
.timeline-table tr:last-child td { border-bottom: none; }

/* Header rows */
.th-vaccine {
  width: 160px; min-width: 140px; background: var(--surface); padding: 10px 12px;
  font-size: 12px; font-weight: 600; color: var(--text-muted); text-align: left;
  vertical-align: middle; position: sticky; left: 0; z-index: 10;
}
.th-time {
  background: var(--surface); font-size: 11px; font-weight: 600;
  color: var(--text-muted); text-align: center; padding: 8px 4px;
  min-width: 54px;
}
.th-time.now-col { background: rgba(74,158,255,0.08); color: var(--accent); }

/* Vaccine name cell */
.td-vaccine {
  background: var(--bg2); padding: 9px 12px;
  font-size: 13px; font-weight: 500; vertical-align: middle;
  position: sticky; left: 0; z-index: 5; line-height: 1.4;
  border-right: 1px solid var(--border-strong) !important;
}
.td-vaccine .vname { display: block; }
.td-vaccine .vtype {
  display: inline-block; font-size: 10px; font-weight: 600;
  letter-spacing: 0.05em; padding: 1px 6px; border-radius: 4px; margin-top: 3px;
}
.vtype.pub { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-border); }
.vtype.priv { background: var(--orange-dim); color: var(--orange); border: 1px solid var(--orange-border); }

/* Dose cells */
.td-dose {
  text-align: center; vertical-align: middle; padding: 6px 3px;
  min-width: 54px; position: relative;
}
.td-dose.now-col { background: rgba(74,158,255,0.04); }
.dose-dot {
  display: inline-flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; border-radius: 50%;
  font-size: 11px; font-weight: 700; font-family: 'IBM Plex Mono', monospace;
  transition: transform 0.15s;
}
.dose-dot:hover { transform: scale(1.15); cursor: default; }
.dose-dot.pub-due { background: var(--green); color: #fff; box-shadow: 0 0 8px rgba(63,185,80,0.4); }
.dose-dot.priv-due { background: var(--orange); color: #fff; box-shadow: 0 0 8px rgba(240,136,62,0.4); }
.dose-dot.pub-now { background: var(--green); color: #fff; box-shadow: 0 0 12px rgba(63,185,80,0.6); animation: pulse-green 2s ease-in-out infinite; }
.dose-dot.priv-now { background: var(--orange); color: #fff; box-shadow: 0 0 12px rgba(240,136,62,0.6); animation: pulse-orange 2s ease-in-out infinite; }
.dose-dot.future { background: var(--surface2); color: var(--text-light); border: 1px solid var(--border); }
.dose-dot.na { background: transparent; }

@keyframes pulse-green {
  0%, 100% { box-shadow: 0 0 8px rgba(63,185,80,0.4); }
  50% { box-shadow: 0 0 16px rgba(63,185,80,0.8); }
}
@keyframes pulse-orange {
  0%, 100% { box-shadow: 0 0 8px rgba(240,136,62,0.4); }
  50% { box-shadow: 0 0 16px rgba(240,136,62,0.8); }
}

/* Now indicator column */
.now-indicator {
  position: absolute; top: 0; bottom: 0; left: 0; right: 0;
  border-left: 2px solid var(--accent);
  pointer-events: none;
}

/* Tooltip */
.dose-dot[data-tip] { position: relative; }
.dose-dot[data-tip]:hover::after {
  content: attr(data-tip);
  position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
  background: #1a2540; border: 1px solid var(--border-strong);
  color: var(--text); font-size: 11px; white-space: nowrap;
  padding: 4px 8px; border-radius: 6px; z-index: 100; font-weight: 400;
  font-family: 'Noto Sans TC', sans-serif; pointer-events: none;
}

/* Section header row */
.section-row td {
  background: var(--surface2); padding: 5px 12px;
  font-size: 11px; font-weight: 700; color: var(--text-muted);
  letter-spacing: 0.08em; text-transform: uppercase;
}

/* ─── Adult section ─── */
#adult-section { display: none; }

.adult-layout { display: grid; grid-template-columns: 260px 1fr; gap: 20px; }
@media (max-width: 700px) { .adult-layout { grid-template-columns: 1fr; } }

.vaccine-list-panel {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
}
.vlist-header {
  padding: 12px 16px; font-size: 13px; font-weight: 700;
  color: var(--text-muted); border-bottom: 1px solid var(--border);
  text-transform: uppercase; letter-spacing: 0.05em;
}
.vlist-item {
  padding: 10px 16px; cursor: pointer; border-bottom: 1px solid var(--border);
  font-size: 14px; color: var(--text-muted); transition: all 0.1s;
  display: flex; align-items: center; gap: 8px;
}
.vlist-item:last-child { border-bottom: none; }
.vlist-item:hover { background: var(--surface); color: var(--text); }
.vlist-item.selected { background: var(--accent-dim); color: var(--accent); border-left: 3px solid var(--accent); }
.vlist-item .vl-icon { font-size: 16px; flex-shrink: 0; }

.vaccine-detail-panel {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 24px;
}
.detail-placeholder {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 300px; color: var(--text-light); gap: 10px;
}
.detail-placeholder svg { opacity: 0.3; }

.detail-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.detail-en { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }

.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
@media (max-width: 500px) { .detail-grid { grid-template-columns: 1fr; } }
.detail-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 14px;
}
.detail-card-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; font-weight: 600; }
.detail-card-value { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.5; }
.detail-card.highlight { border-color: var(--accent); background: var(--accent-dim); }
.detail-card.highlight .detail-card-value { color: var(--accent); }

.detail-section { margin-bottom: 16px; }
.detail-section-title {
  font-size: 12px; font-weight: 700; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px;
}
.detail-section ul { list-style: none; }
.detail-section ul li {
  font-size: 14px; color: var(--text); padding: 4px 0;
  padding-left: 14px; position: relative;
}
.detail-section ul li::before {
  content: '·'; position: absolute; left: 0; color: var(--accent);
}
.detail-note {
  background: var(--surface); border-left: 3px solid var(--yellow);
  border-radius: 0 6px 6px 0; padding: 10px 14px;
  font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-top: 8px;
}
.price-badge {
  display: inline-block; background: rgba(212,168,67,0.12);
  border: 1px solid rgba(212,168,67,0.35); color: var(--yellow);
  border-radius: 6px; padding: 4px 12px; font-size: 13px; font-weight: 600;
  margin-top: 4px;
}

/* Footer */
.footer-meta {
  text-align: center; padding: 28px 20px 20px;
  font-size: 12px; color: var(--text-light); line-height: 1.8;
}
.footer-meta a { color: var(--accent); text-decoration: none; }

/* Responsive */
@media (max-width: 600px) {
  .page-wrap { padding: 16px 12px; }
  .th-vaccine, .td-vaccine { width: 120px; min-width: 110px; }
  .th-time { min-width: 40px; }
  .dose-dot { width: 24px; height: 24px; font-size: 10px; }
}
</style>

// ══════════════════════════════════════════════════════
//  MODE SWITCH
// ══════════════════════════════════════════════════════
function setMode(mode) {
  document.getElementById('btn-peds').className = 'mode-btn' + (mode === 'peds' ? ' active' : '');
  document.getElementById('btn-adult').className = 'mode-btn' + (mode === 'adult' ? ' active' : '');
  document.getElementById('peds-section').style.cssText = mode === 'peds' ? 'display:block' : 'display:none';
  document.getElementById('adult-section').style.cssText = mode === 'adult' ? 'display:block' : 'display:none';
  if (mode === 'adult') renderAdultList();
  if (mode === 'peds') renderTimeline();
}

// ══════════════════════════════════════════════════════
//  PEDIATRIC TIMELINE
// ══════════════════════════════════════════════════════
function getAgeMonths(dob) {
  const today = new Date();
  const birth = new Date(dob);
  const y = today.getFullYear() - birth.getFullYear();
  const m = today.getMonth() - birth.getMonth();
  return y * 12 + m + (today.getDate() >= birth.getDate() ? 0 : -1);
}

function formatAge(months) {
  if (months < 0) return '未出生';
  if (months < 1) return '新生兒';
  if (months < 24) return months + ' 個月';
  const y = Math.floor(months / 12);
  const m = months % 12;
  return m > 0 ? `${y} 歲 ${m} 個月` : `${y} 歲`;
}

function renderTimeline() {
  const dob = document.getElementById('dobInput').value;
  const ageDisplay = document.getElementById('ageDisplay');
  const thead = document.getElementById('timelineHead');
  const tbody = document.getElementById('timelineBody');

  if (!dob) {
    ageDisplay.textContent = '—';
    renderTimelineNoAge(thead, tbody);
    return;
  }

  const ageMonths = getAgeMonths(dob);
  ageDisplay.textContent = '今日月齡：' + formatAge(ageMonths);

  // Find "now" column index (closest time column to current age)
  let nowColIdx = -1;
  for (let i = 0; i < TIME_COLS.length; i++) {
    if (TIME_COLS[i].months <= ageMonths) nowColIdx = i;
  }

  // Build header
  let headHtml = '<tr><th class="th-vaccine">疫苗</th>';
  TIME_COLS.forEach((col, i) => {
    const isNow = (i === nowColIdx);
    headHtml += `<th class="th-time${isNow ? ' now-col' : ''}">${col.label.replace('\n','<br>')}</th>`;
  });
  headHtml += '</tr>';
  thead.innerHTML = headHtml;

  // Build body
  let bodyHtml = '';
  let lastSection = '';

  PED_VACCINES.forEach(vax => {
    // Section separator
    if (vax.section && vax.section !== lastSection) {
      lastSection = vax.section;
      bodyHtml += `<tr class="section-row"><td colspan="${TIME_COLS.length + 1}">${vax.section}</td></tr>`;
    }

    bodyHtml += '<tr>';
    bodyHtml += `<td class="td-vaccine">
      <span class="vname">${vax.name.replace('\n','<br>')}</span>
      <span class="vtype ${vax.type}">${vax.type === 'pub' ? '公費' : '自費'}</span>
    </td>`;

    TIME_COLS.forEach((col, colIdx) => {
      const isNowCol = (colIdx === nowColIdx);
      // Find dose for this column
      const dose = vax.doses.find(d => d.months === col.months);
      const isColPast = col.months <= ageMonths;
      const isColPresent = colIdx === nowColIdx;

      let dotHtml = '';
      if (dose) {
        let cls = '';
        if (isColPresent) {
          cls = vax.type === 'pub' ? 'pub-now' : 'priv-now';
        } else if (isColPast) {
          cls = vax.type === 'pub' ? 'pub-due' : 'priv-due';
        } else {
          cls = 'future';
        }
        dotHtml = `<div class="dose-dot ${cls}" data-tip="${dose.tip}">${dose.label}</div>`;
      }

      bodyHtml += `<td class="td-dose${isNowCol ? ' now-col' : ''}">${dotHtml}</td>`;
    });

    bodyHtml += '</tr>';
  });

  tbody.innerHTML = bodyHtml;
}

function renderTimelineNoAge(thead, tbody) {
  let headHtml = '<tr><th class="th-vaccine">疫苗</th>';
  TIME_COLS.forEach(col => {
    headHtml += `<th class="th-time">${col.label.replace('\n','<br>')}</th>`;
  });
  headHtml += '</tr>';
  thead.innerHTML = headHtml;

  let bodyHtml = '';
  let lastSection = '';
  PED_VACCINES.forEach(vax => {
    if (vax.section && vax.section !== lastSection) {
      lastSection = vax.section;
      bodyHtml += `<tr class="section-row"><td colspan="${TIME_COLS.length + 1}">${vax.section}</td></tr>`;
    }
    bodyHtml += '<tr>';
    bodyHtml += `<td class="td-vaccine">
      <span class="vname">${vax.name.replace('\n','<br>')}</span>
      <span class="vtype ${vax.type}">${vax.type === 'pub' ? '公費' : '自費'}</span>
    </td>`;
    TIME_COLS.forEach(col => {
      const dose = vax.doses.find(d => d.months === col.months);
      let dotHtml = '';
      if (dose) {
        dotHtml = `<div class="dose-dot future" data-tip="${dose.tip}">${dose.label}</div>`;
      }
      bodyHtml += `<td class="td-dose">${dotHtml}</td>`;
    });
    bodyHtml += '</tr>';
  });
  tbody.innerHTML = bodyHtml;
}

// ══════════════════════════════════════════════════════
//  ADULT VACCINE LIST & DETAIL
// ══════════════════════════════════════════════════════
let selectedAdult = null;

function renderAdultList(query) {
  const container = document.getElementById('adultList');
  const q = (query || '').toLowerCase().trim();
  const filtered = q
    ? ADULT_VACCINES.filter(v => v.name.toLowerCase().includes(q) || v.en.toLowerCase().includes(q))
    : ADULT_VACCINES;
  container.innerHTML = filtered.length
    ? filtered.map(v =>
        `<div class="vlist-item${selectedAdult === v.id ? ' selected' : ''}" onclick="showAdultDetail('${v.id}')">
          <span>${v.name}</span>
        </div>`
      ).join('')
    : '<div style="padding:16px;color:var(--text-light);font-size:13px">找不到相關疫苗</div>';
}

function showAdultDetail(id) {
  selectedAdult = id;
  renderAdultList();
  const v = ADULT_VACCINES.find(x => x.id === id);
  if (!v) return;

  const noteItems = v.notes.map(n => `<li>${n}</li>`).join('');
  const priceHtml = v.price
    ? `<div class="price-badge">💰 ${v.price}</div>`
    : `<div style="color:var(--text-light);font-size:13px;margin-top:4px">待補充（請洽診所）</div>`;

  document.getElementById('adultDetail').innerHTML = `
    <div class="detail-title">${v.name}</div>
    <div class="detail-en">${v.en}</div>

    <div class="detail-grid">
      <div class="detail-card highlight">
        <div class="detail-card-label">劑數</div>
        <div class="detail-card-value">${v.doses}</div>
      </div>
      <div class="detail-card highlight">
        <div class="detail-card-label">接種時程</div>
        <div class="detail-card-value">${v.schedule}</div>
      </div>
      <div class="detail-card" style="grid-column: span 2">
        <div class="detail-card-label">適用對象</div>
        <div class="detail-card-value">${v.target}</div>
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">注意事項</div>
      <ul>${noteItems}</ul>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">接種禁忌</div>
      <div class="detail-note">⚠️ ${v.contraindication}</div>
    </div>

    ${v.public_note ? `<div class="detail-section">
      <div class="detail-section-title" style="color:var(--green)">📋 公費資訊</div>
      <div class="detail-note" style="border-color:var(--green)">${v.public_note}</div>
    </div>` : ''}

    <div class="detail-section">
      <div class="detail-section-title">自費價格</div>
      ${priceHtml}
    </div>
  `;
}
